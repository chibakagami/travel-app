<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>旅行計畫</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="旅行計畫">
<meta name="theme-color" content="#CC0000">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='40' fill='%231a1a1a'/><path d='M16 96 a80 80 0 0 1 160 0 Z' fill='%23CC0000'/><path d='M16 96 a80 80 0 0 0 160 0 Z' fill='white'/><circle cx='96' cy='96' r='80' fill='none' stroke='%23111' stroke-width='8'/><rect x='16' y='88' width='160' height='16' fill='%23111'/><circle cx='96' cy='96' r='24' fill='%23111'/><circle cx='96' cy='96' r='16' fill='white'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
:root{--sand:#FFF9C4;--warm:#FFE082;--terracotta:#CC0000;--terra-dark:#990000;--deep:#1a1a1a;--mid:#555;--light:#FFF9F0;--red:#CC0000;--blue:#3B4CCA;--shadow:0 4px 20px rgba(0,0,0,0.13);--radius:16px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--light);color:var(--deep);min-height:100vh;max-width:480px;margin:0 auto;}
/* HOME */
#home-screen{min-height:100vh;display:flex;flex-direction:column;overflow:hidden;background:#CC0000;position:relative;}
.home-top{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px 50px;}
.pokeball{width:110px;height:110px;border-radius:50%;background:white;position:relative;border:5px solid #1a1a1a;margin-bottom:20px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.3);cursor:pointer;animation:pokeball-idle 2.5s ease-in-out infinite;}
@keyframes pokeball-idle{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.pokeball-top{position:absolute;top:0;left:0;right:0;height:50%;background:#CC0000;}
.pokeball-belt{position:absolute;left:0;right:0;top:50%;height:5px;background:#1a1a1a;transform:translateY(-50%);z-index:2;}
.pokeball-btn{position:absolute;left:50%;top:50%;width:24px;height:24px;background:white;border:5px solid #1a1a1a;border-radius:50%;transform:translate(-50%,-50%);z-index:3;}
.home-title{font-family:'Press Start 2P',monospace;color:white;font-size:14px;text-align:center;line-height:2;text-shadow:3px 3px 0 rgba(0,0,0,.3);}
.home-sub{color:rgba(255,255,255,.7);font-size:13px;margin-top:8px;}
.home-bottom{background:white;border-radius:32px 32px 0 0;padding:36px 24px 48px;display:flex;flex-direction:column;align-items:center;gap:14px;transform:translateY(100%);opacity:0;pointer-events:none;transition:transform .45s cubic-bezier(.34,1.56,.64,1),opacity .3s;}
.home-bottom.visible{transform:translateY(0);opacity:1;pointer-events:auto;}
.home-version{position:absolute;bottom:16px;right:16px;font-family:'Press Start 2P',monospace;font-size:9px;color:white;text-shadow:0 1px 6px rgba(0,0,0,.6);pointer-events:none;letter-spacing:.05em;}
.home-divider{width:50px;height:4px;background:#1a1a1a;border-radius:2px;margin-bottom:4px;}
.btn-home{width:100%;max-width:320px;border:none;border-radius:14px;padding:18px 20px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;display:flex;align-items:center;gap:14px;text-align:left;}
.btn-home-new{background:#CC0000;color:white;box-shadow:0 4px 0 #990000;}
.btn-home-cont{background:#1a1a1a;color:white;box-shadow:0 4px 0 #000;}
.btn-home-cont:disabled{background:#aaa;box-shadow:0 4px 0 #888;cursor:not-allowed;}
.btn-home-mem{background:#FFD700;color:#1a1a1a;box-shadow:0 4px 0 #CC9900;}
.btn-home-icon{width:44px;height:44px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}.btn-home-icon img{width:44px;height:44px;object-fit:contain;}
.btn-home-label{font-size:16px;font-weight:700;}
.btn-home-sub{font-size:11px;opacity:.7;margin-top:2px;}
/* SETUP */
#setup-screen{min-height:100vh;background:#CC0000;display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;position:relative;overflow:hidden;}
#setup-screen::before{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,0.06);top:-60px;right:-60px;}
.setup-back{position:absolute;top:16px;left:16px;background:rgba(255,255,255,.15);border:none;border-radius:10px;color:white;padding:8px 14px;font-family:'Noto Sans TC',sans-serif;font-size:13px;cursor:pointer;z-index:2;}
.setup-title{font-family:'Press Start 2P',monospace;color:white;font-size:12px;text-align:center;margin-bottom:6px;position:relative;z-index:1;line-height:2;text-shadow:2px 2px 0 rgba(0,0,0,.25);}
.setup-sub{color:rgba(255,255,255,0.65);font-size:13px;text-align:center;margin-bottom:28px;position:relative;z-index:1;}
.setup-card{background:rgba(255,255,255,0.12);backdrop-filter:blur(12px);border:2px solid rgba(255,255,255,0.2);border-radius:24px;padding:28px 24px;width:100%;position:relative;z-index:1;}
.field-group{margin-bottom:20px;}
.field-label{color:rgba(255,255,255,0.85);font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;display:block;}
.field-input{width:100%;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.25);border-radius:12px;color:white;font-family:'Noto Sans TC',sans-serif;font-size:15px;padding:12px 16px;outline:none;}
.field-input::placeholder{color:rgba(255,255,255,0.4);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
select.field-input option{background:#880000;color:white;}
.btn-start{width:100%;background:#FFD700;color:#1a1a1a;border:none;border-radius:14px;padding:16px;font-family:'Noto Sans TC',sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;box-shadow:0 4px 0 #CC9900;}
/* APP */
#app{display:none;flex-direction:column;min-height:100vh;}
#app.expense-mode{height:100dvh;overflow:hidden;}
#app.expense-mode #tab-expense{display:block !important;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0;}
#app.expense-mode .exp-header{position:sticky;top:0;z-index:20;}#app.expense-mode .expense-list{overflow-y:visible;padding-bottom:80px;}#app.map-mode{height:100dvh;overflow:hidden;}#app.map-mode #tab-map{flex:1;min-height:0;overflow:hidden;}#app.map-mode #map-container{flex:1;min-height:0;height:auto !important;}
.app-header{background:#CC0000;padding:14px 16px 10px;position:sticky;top:0;z-index:100;border-bottom:3px solid #990000;}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;}
.trip-name{font-family:'Press Start 2P',monospace;font-size:11px;color:white;line-height:1.7;text-shadow:1px 1px 0 rgba(0,0,0,.3);}
.trip-dates{font-size:11px;color:rgba(255,255,255,0.65);margin-top:4px;}
.header-btns{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;}
.header-btn{background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.25);border-radius:8px;color:white;font-size:11px;padding:5px 8px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;white-space:nowrap;}
.header-btn.edit-on{background:#FFD700;color:#1a1a1a;border-color:#FFD700;}
.header-btn-mem{background:#FFD700;color:#1a1a1a;border-color:#FFD700;font-weight:700;}
.tab-bar{background:#1a1a1a;display:flex;border-top:3px solid #CC0000;padding:0 4px 4px;position:sticky;bottom:0;z-index:100;order:10;}
.tab-btn{flex:1;background:none;border:none;color:rgba(255,255,255,0.4);font-family:'Noto Sans TC',sans-serif;font-size:11px;padding:8px 4px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;}
.tab-btn.active{color:#FFD700;}
.tab-icon{width:44px;height:44px;object-fit:contain;filter:brightness(0.55);}.tab-btn.active .tab-icon{filter:none;}
.tab-content{display:none;flex:1;padding:16px;}
.tab-content.active{display:block;}
#tab-map{padding:0;}
#tab-map.active{display:flex;flex-direction:column;}
/* DAY TABS */
.day-tabs-wrap{overflow-x:auto;margin:0 -16px;padding:0 16px;scrollbar-width:none;margin-bottom:16px;}
.day-tabs-wrap::-webkit-scrollbar{display:none;}
.day-tabs{display:flex;gap:8px;white-space:nowrap;padding-bottom:4px;}
.day-tab{background:white;border:2px solid #FFE082;border-radius:10px;color:var(--mid);font-family:'Noto Sans TC',sans-serif;font-size:13px;padding:7px 14px;cursor:pointer;flex-shrink:0;}
.day-tab.active{background:#CC0000;border-color:#CC0000;color:white;font-weight:700;}
/* BOARDING PASS */
.boarding-pass{position:relative;margin-bottom:16px;filter:drop-shadow(0 6px 18px rgba(26,90,120,0.3));}
.bp-main{background:linear-gradient(135deg,#0f4c75 0%,#1b6ca8 45%,#2196c4 100%);border-radius:16px 16px 0 0;padding:18px 20px 16px;color:white;}
.bp-top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.bp-airline{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:.15em;opacity:.7;text-transform:uppercase;}
.bp-flight-num{font-family:'Share Tech Mono',monospace;font-size:12px;background:rgba(255,255,255,.15);padding:3px 10px;border-radius:6px;}
.bp-actions{display:flex;gap:6px;}
.bp-edit-btn{background:rgba(255,255,255,.12);border:none;border-radius:8px;color:rgba(255,255,255,.8);font-size:12px;padding:4px 8px;cursor:pointer;}
.bp-del{background:rgba(255,255,255,.12);border:none;border-radius:8px;color:rgba(255,255,255,.7);font-size:13px;padding:4px 8px;cursor:pointer;}
.bp-route{display:flex;align-items:center;gap:6px;margin-bottom:14px;}
.bp-airport{text-align:center;min-width:56px;}
.bp-iata{font-family:'Share Tech Mono',monospace;font-size:30px;font-weight:700;line-height:1;}
.bp-city{font-size:10px;opacity:.6;margin-top:3px;}
.bp-mid{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bp-arrow-line{display:flex;align-items:center;width:100%;gap:3px;}
.bp-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.4);flex-shrink:0;}
.bp-dashes{flex:1;border-top:2px dashed rgba(255,255,255,.3);}
.bp-dur-text{font-family:'Share Tech Mono',monospace;font-size:10px;opacity:.6;}
.bp-times-row{display:flex;justify-content:space-between;}
.bp-time-blk{text-align:center;}
.bp-time-big{font-family:'Share Tech Mono',monospace;font-size:22px;font-weight:700;}
.bp-time-lbl{font-size:9px;opacity:.55;letter-spacing:.08em;text-transform:uppercase;margin-top:2px;}
.bp-tear{height:20px;background:linear-gradient(135deg,#1565a0,#1a7bbf);display:flex;align-items:center;position:relative;}
.bp-tear::before{content:'';position:absolute;left:-10px;width:20px;height:20px;border-radius:50%;background:var(--light);z-index:2;}
.bp-tear::after{content:'';position:absolute;right:-10px;width:20px;height:20px;border-radius:50%;background:var(--light);z-index:2;}
.bp-tear-line{flex:1;margin:0 8px;border-top:2px dashed rgba(255,255,255,.25);}
.bp-tear-txt{position:absolute;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;font-size:8px;color:rgba(255,255,255,.35);letter-spacing:.15em;white-space:nowrap;}
.bp-stub{background:linear-gradient(135deg,#1a7bbf,#2196c4);border-radius:0 0 16px 16px;padding:12px 20px 14px;color:white;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.bp-stub-f{text-align:center;}
.bp-stub-lbl{font-size:8px;opacity:.5;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px;}
.bp-stub-v{font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700;}
.bp-barcode{display:flex;gap:1.5px;align-items:flex-end;height:26px;}
.bp-barcode span{display:inline-block;background:rgba(255,255,255,.65);border-radius:1px;}
.bp-note-strip{background:linear-gradient(135deg,#1a7bbf,#2196c4);border-radius:0 0 16px 16px;padding:6px 20px 12px;color:rgba(255,255,255,.65);font-size:11px;margin-top:-4px;}
.bp-edit-panel{display:none;background:rgba(255,255,255,.08);border-top:1px solid rgba(255,255,255,.15);padding:14px 20px 16px;}
.bp-edit-panel.open{display:block;}
.bp-edit-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.bp-edit-input{width:100%;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:8px;color:white;font-family:'Noto Sans TC',sans-serif;font-size:13px;padding:8px 10px;outline:none;}
.bp-edit-input::placeholder{color:rgba(255,255,255,.4);}
.bp-edit-time{width:100%;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:8px;color:white;font-family:'Share Tech Mono',monospace;font-size:15px;padding:8px 10px;outline:none;}
.bp-save-btn{width:100%;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:8px;color:white;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:600;padding:9px;cursor:pointer;margin-top:4px;}
.btn-add-flight{width:100%;background:rgba(26,107,138,.08);border:2px dashed rgba(26,107,138,.25);border-radius:12px;color:var(--blue);font-family:'Noto Sans TC',sans-serif;font-size:14px;padding:12px;cursor:pointer;margin-bottom:16px;}
.flight-form{background:white;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:16px;display:none;}
.flight-form.open{display:block;}
/* TIMELINE */
.plan-timeline{display:flex;flex-direction:column;margin-bottom:16px;}
.plan-item{background:white;border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);display:block;border-left:4px solid #CC0000;}
.plan-row{display:flex;gap:12px;align-items:flex-start;}
.plan-time-col{min-width:48px;display:flex;flex-direction:column;align-items:center;}
.plan-time{font-size:13px;font-weight:700;color:#CC0000;}
.plan-end-time{font-size:11px;color:var(--mid);opacity:.65;margin-top:2px;}
.plan-body{flex:1;min-width:0;}
.plan-name{font-size:15px;font-weight:600;color:var(--deep);margin-bottom:4px;}
.plan-note-txt{font-size:12px;color:var(--mid);line-height:1.4;margin-bottom:4px;}
.plan-tags{display:flex;flex-wrap:wrap;gap:6px;}
.plan-maps-link{font-size:11px;color:#3B4CCA;display:inline-flex;align-items:center;gap:3px;margin-top:5px;text-decoration:none;opacity:.85;font-weight:500;}
.plan-maps-link:active{opacity:1;}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;}
.tag-cat{background:#FFE082;color:#7B5800;}
.tag-stay{background:rgba(204,0,0,.1);color:#CC0000;}
.plan-actions{display:flex;gap:4px;flex-shrink:0;}
.plan-edit-btn{background:rgba(204,0,0,.1);border:none;color:#CC0000;font-size:13px;cursor:pointer;padding:3px 7px;border-radius:6px;line-height:1;}
.plan-copy-btn{background:rgba(59,76,202,.12);border:none;color:#3B4CCA;font-size:13px;cursor:pointer;padding:3px 7px;border-radius:6px;line-height:1;}
.plan-del{background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;padding:2px 4px;line-height:1;}
.plan-edit-panel{display:none;margin-top:12px;padding-top:12px;border-top:1px solid #FFE082;}
.plan-copy-panel{display:none;margin-top:10px;padding-top:10px;border-top:1px dashed #FFE082;}
.plan-copy-panel.open{display:block;}
.plan-edit-panel.open{display:block;}
.edit-field-label{font-size:11px;color:var(--mid);margin-bottom:4px;font-weight:600;}
.edit-input{width:100%;border:2px solid #FFE082;border-radius:8px;padding:8px 10px;font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--deep);outline:none;background:var(--light);margin-bottom:8px;}
.edit-input:focus{border-color:#CC0000;}
.edit-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.btn-save-edit{width:100%;background:#CC0000;color:white;border:none;border-radius:8px;padding:9px;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
/* TRANSPORT CONNECTOR */
.tc-wrap{display:flex;align-items:stretch;}
.tc-spine{width:48px;display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
.tc-vline{width:2px;background:#FFE082;flex:1;min-height:10px;}
.tc-circle{width:10px;height:10px;border-radius:50%;background:white;border:2px solid #FFE082;flex-shrink:0;}
.tc-card{flex:1;margin:4px 0;background:white;border-radius:12px;border:2px solid #FFE082;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden;}
.tc-summary{display:flex;align-items:center;gap:10px;padding:10px 14px;}
.tc-summary.clickable{cursor:pointer;}
.tc-icon-big{font-size:20px;}
.tc-info{flex:1;}
.tc-mode-label{font-size:13px;font-weight:600;color:var(--deep);}
.tc-dur-label{font-size:11px;color:var(--mid);margin-top:1px;}
.tc-chevron{font-size:11px;color:var(--mid);transition:transform .2s;display:inline-block;}
.tc-chevron.open{transform:rotate(180deg);}
.tc-panel{display:none;padding:12px 14px 14px;border-top:1px solid #FFE082;}
.tc-panel.open{display:block;}
.tc-panel-title{font-size:11px;font-weight:600;color:var(--mid);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;}
.tc-mode-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.tc-mode-btn{background:var(--light);border:2px solid #FFE082;border-radius:10px;padding:8px 4px;text-align:center;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.tc-mode-btn .tm-icon{font-size:20px;display:block;margin-bottom:3px;}
.tc-mode-btn .tm-label{font-size:10px;color:var(--mid);}
.tc-mode-btn.sel{background:#CC0000;border-color:#CC0000;}
.tc-mode-btn.sel .tm-label{color:white;}
.tc-done-btn{width:100%;background:#CC0000;color:white;border:none;border-radius:10px;padding:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin-top:8px;}
/* DRUM PICKER */
.drum-group{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;}
.drum-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.drum-col-label{font-size:11px;color:var(--mid);font-weight:600;}
.drum{width:100%;height:96px;overflow:hidden;position:relative;border:2px solid #FFE082;border-radius:10px;background:var(--light);cursor:ns-resize;}
.drum-inner{display:flex;flex-direction:column;}
.drum-item{height:32px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:var(--mid);user-select:none;flex-shrink:0;}
.drum-item.sel{color:#CC0000;font-size:17px;}
.drum::before,.drum::after{content:'';position:absolute;left:0;right:0;height:32px;z-index:2;pointer-events:none;}
.drum::before{top:0;background:linear-gradient(to bottom,var(--light) 30%,transparent);}
.drum::after{bottom:0;background:linear-gradient(to top,var(--light) 30%,transparent);}
.drum-sel-bar{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:32px;background:rgba(204,0,0,.08);border-top:1.5px solid rgba(204,0,0,.4);border-bottom:1.5px solid rgba(204,0,0,.4);pointer-events:none;z-index:1;}
/* ADD FORM */
.add-card{background:white;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:16px;border:2px solid #FFE082;}
.add-card h3{font-size:14px;font-weight:700;color:var(--mid);margin-bottom:12px;text-transform:uppercase;letter-spacing:.06em;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.form-input{width:100%;border:2px solid #FFE082;border-radius:10px;padding:10px 12px;font-family:'Noto Sans TC',sans-serif;font-size:14px;color:var(--deep);outline:none;background:var(--light);}
.form-input:focus{border-color:#CC0000;}
.btn-add{width:100%;background:#CC0000;color:white;border:none;border-radius:10px;padding:12px;font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
/* EXPENSE NEW LAYOUT */
.exp-header{background:var(--deep);padding:16px 16px 0;color:var(--sand);}
.exp-header-top{padding-bottom:12px;}
.exp-day-label{font-size:12px;opacity:.6;margin-bottom:4px;}
.exp-day-total{font-size:32px;font-weight:700;line-height:1;color:#FFD700;}
.exp-day-twd{font-size:13px;opacity:.55;margin-top:4px;}
.exp-rate{font-size:11px;opacity:.4;margin-top:2px;}
.exp-day-tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:12px;}
.exp-day-tabs::-webkit-scrollbar{display:none;}
.exp-day-tab{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.15);border-radius:10px;color:rgba(245,236,215,.7);font-family:'Noto Sans TC',sans-serif;font-size:12px;padding:6px 12px;cursor:pointer;flex-shrink:0;white-space:nowrap;transition:all .2s;}
.exp-day-tab.active{background:var(--terracotta);border-color:var(--terracotta);color:white;font-weight:600;}
.exp-day-chip{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.15);border-radius:12px;color:rgba(245,236,215,.7);font-family:'Noto Sans TC',sans-serif;font-size:12px;padding:8px 14px;cursor:pointer;flex-shrink:0;white-space:nowrap;text-align:center;transition:all .2s;}
.exp-day-chip.active{background:#FFD700;border-color:#FFD700;color:#1a1a1a;font-weight:700;}
.edc-label{font-size:12px;font-weight:600;margin-bottom:1px;}
.edc-dow{font-size:10px;opacity:.7;margin-bottom:1px;}
.edc-amt{font-size:11px;opacity:.75;}
.exp-cat-filter{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:12px 16px 4px;background:var(--light);}
.exp-cat-filter::-webkit-scrollbar{display:none;}
.exp-cat-chip{background:white;border:2px solid #FFE082;border-radius:20px;padding:5px 12px;font-size:12px;color:var(--mid);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.exp-cat-chip.active{background:#CC0000;border-color:#CC0000;color:white;font-weight:700;}
.expense-list{display:flex;flex-direction:column;gap:8px;padding:12px 16px 88px;}
.expense-item{background:white;border-radius:12px;padding:12px 14px;box-shadow:0 2px 8px rgba(0,0,0,.07);display:flex;flex-direction:column;border-left:4px solid #FFD700;}
.exp-row{display:flex;align-items:center;gap:10px;}
.expense-icon{width:36px;height:36px;border-radius:10px;background:#FFE082;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.expense-info{flex:1;min-width:0;}
.expense-name{font-size:14px;font-weight:600;}
.expense-day-tag{font-size:11px;color:var(--mid);}
.expense-amount{font-size:15px;font-weight:700;color:#CC0000;white-space:nowrap;}
.expense-del{background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;padding:2px;}
.exp-edit-panel{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #FFE082;}
.exp-edit-panel.open{display:block;}
/* PAYMENT METHOD */
.pay-tag{display:inline-flex;align-items:center;gap:2px;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;margin-left:4px;vertical-align:middle;}
.pay-cash{background:#e8f5e9;color:#2e7d32;}.pay-card{background:#e3f2fd;color:#1565c0;}.pay-ic{background:#fce4ec;color:#c2185b;}
.pay-method-btn{flex:1;background:white;border:2px solid #FFE082;border-radius:10px;padding:7px 4px;font-size:11px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s;}
.pay-method-btn.active{border-color:#CC0000;background:rgba(204,0,0,.07);color:#CC0000;font-weight:700;}
/* PHOTOS */
.photo-thumb{width:100%;max-width:300px;border-radius:8px;margin-top:6px;cursor:pointer;display:block;box-shadow:0 2px 8px rgba(0,0,0,.12);}
.photo-upload-btn{background:rgba(59,76,202,.08);border:1.5px dashed #3B4CCA;border-radius:8px;color:#3B4CCA;font-size:11px;padding:5px 10px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-family:'Noto Sans TC',sans-serif;}
.photo-del-btn{background:none;border:none;color:#ccc;font-size:13px;cursor:pointer;padding:0 4px;display:none;}
.photo-viewer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:500;align-items:center;justify-content:center;cursor:pointer;}
.photo-viewer-overlay.open{display:flex;}.photo-viewer-overlay img{max-width:95vw;max-height:90vh;border-radius:10px;object-fit:contain;}
/* FAB */
.fab{position:fixed;bottom:80px;right:20px;width:52px;height:52px;border-radius:50%;background:#CC0000;color:white;border:none;font-size:26px;display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(204,0,0,.5);z-index:50;line-height:1;}
.fab.show{display:flex;}
/* ADD EXPENSE SHEET */
.add-exp-sheet{background:white;border-radius:24px 24px 0 0;padding:20px 20px 40px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.exp-cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.exp-cat-item{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 6px;border:2px solid #FFE082;border-radius:12px;cursor:pointer;transition:all .15s;}
.exp-cat-item.sel{border-color:#CC0000;background:rgba(204,0,0,.07);}
.exp-cat-item .eci{font-size:26px;line-height:1;}
.exp-cat-item .ecl{font-size:11px;color:var(--mid);}
.exp-cat-item.sel .ecl{color:#CC0000;font-weight:600;}
#tab-expense .expense-list{padding:12px 16px;margin-bottom:80px;}
#tab-expense .empty{padding:40px 16px;}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(44,36,22,.55);z-index:300;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-sheet{background:white;border-radius:24px 24px 0 0;padding:20px 20px 40px;width:100%;max-width:480px;}
.modal-handle{width:40px;height:4px;background:var(--warm);border-radius:2px;margin:0 auto 18px;}
.modal-title{font-size:17px;font-weight:700;color:var(--deep);margin-bottom:16px;}
.export-btn{width:100%;display:flex;align-items:center;gap:14px;background:var(--light);border:2px solid #FFE082;border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;text-align:left;}
.export-btn-icon{font-size:28px;flex-shrink:0;}
.export-btn-info .etitle{font-size:15px;font-weight:600;color:var(--deep);}
.export-btn-info .edesc{font-size:12px;color:var(--mid);margin-top:2px;}
.modal-cancel{width:100%;background:none;border:none;color:var(--mid);font-family:'Noto Sans TC',sans-serif;font-size:14px;padding:10px;cursor:pointer;margin-top:4px;}
/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--mid);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-text{font-size:14px;opacity:.7;}
/* DRAG */
.plan-item.dragging{opacity:.35;transform:scale(.98);transition:transform .1s;}
.plan-item.drag-over{box-shadow:0 -3px 0 0 #CC0000,var(--shadow);}
.drag-handle{display:flex;align-items:center;justify-content:center;color:#ccc;font-size:16px;cursor:grab;padding:2px 6px 2px 0;flex-shrink:0;touch-action:none;user-select:none;-webkit-user-select:none;}
.drag-handle:active{cursor:grabbing;color:#aaa;}
/* MAP */
.map-day-btn{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.25);border-radius:8px;color:rgba(255,255,255,.7);font-size:11px;padding:4px 12px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;flex-shrink:0;white-space:nowrap;}
.map-day-btn.active{background:#FFD700;color:#1a1a1a;border-color:#FFD700;font-weight:700;}
#map-container{width:100%;}
.map-pin-banner{background:#3B4CCA;color:white;padding:10px 16px;font-size:13px;font-family:'Noto Sans TC',sans-serif;display:none;align-items:center;gap:10px;}
.map-pin-banner.show{display:flex;}
.pin-set-btn{font-size:11px;padding:3px 8px;background:rgba(59,76,202,.12);border:1px solid rgba(59,76,202,.25);color:#3B4CCA;border-radius:6px;cursor:pointer;margin-top:6px;font-family:'Noto Sans TC',sans-serif;}
.pin-remove-btn{font-size:11px;padding:3px 8px;background:rgba(204,0,0,.1);border:1px solid rgba(204,0,0,.2);color:#CC0000;border-radius:6px;cursor:pointer;margin-top:6px;font-family:'Noto Sans TC',sans-serif;}
.map-tc-label{background:white;border:1.5px solid #ddd;border-radius:20px;padding:2px 8px;font-size:11px;font-family:'Noto Sans TC',sans-serif;color:#333;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.15);text-align:center;line-height:1.4;}
/* PREP TAB */
.prep-progress{background:white;border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);}
.prep-prog-bar{flex:1;height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden;}
.prep-prog-fill{height:100%;background:#CC0000;border-radius:4px;transition:width .3s;}
.prep-cat-group{margin-bottom:20px;}
.prep-cat-title{font-size:11px;font-weight:700;color:var(--mid);letter-spacing:.08em;text-transform:uppercase;padding:10px 0 8px;border-bottom:2px solid var(--warm);margin-bottom:10px;}
.prep-items-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;}
.prep-item{display:flex;align-items:center;gap:8px;background:white;border-radius:10px;padding:9px 10px;box-shadow:var(--shadow);}
.prep-check{width:22px;height:22px;accent-color:#CC0000;cursor:pointer;flex-shrink:0;}
.prep-item-label{flex:1;font-size:14px;cursor:pointer;line-height:1.4;}
.prep-done{text-decoration:line-through;opacity:.45;}
.prep-del-btn{background:none;border:none;color:#CC0000;font-size:13px;padding:4px 6px;cursor:pointer;opacity:.5;flex-shrink:0;}
.prep-add-row{display:flex;gap:8px;margin-top:16px;padding-top:16px;border-top:2px solid var(--warm);}
/* LIST SUB-TABS */
.list-sub-tabs{display:flex;background:white;border-radius:12px;padding:4px;margin-bottom:16px;box-shadow:var(--shadow);gap:4px;}
.list-sub-btn{flex:1;background:none;border:none;border-radius:9px;padding:10px;font-family:var(--sans,sans-serif);font-size:13px;font-weight:600;color:var(--mid);cursor:pointer;transition:all .2s;}
.list-sub-btn.active{background:#CC0000;color:white;}
/* WISH LIST */
.wish-type-header{font-size:11px;font-weight:700;color:var(--mid);letter-spacing:.08em;text-transform:uppercase;padding:10px 0 8px;border-bottom:2px solid var(--warm);margin-bottom:10px;}
.wish-item{display:flex;align-items:center;gap:10px;background:white;border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);}
.wish-check{width:22px;height:22px;accent-color:#CC0000;cursor:pointer;flex-shrink:0;}
.wish-item-label{flex:1;min-width:0;}
.wish-item-name{font-size:14px;line-height:1.4;}
.wish-item-meta{font-size:11px;color:var(--mid);margin-top:2px;}
.wish-done .wish-item-name{text-decoration:line-through;opacity:.45;}
.wish-del-btn{background:none;border:none;color:#CC0000;font-size:13px;padding:4px 6px;cursor:pointer;opacity:.5;flex-shrink:0;}
/* POKECENTER */
.pc-header-bar{background:white;border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);}
.pc-prog-bar{flex:1;height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden;}
.pc-prog-fill{height:100%;background:#CC0000;border-radius:4px;transition:width .3s;}
.pc-item{display:flex;align-items:flex-start;gap:10px;background:white;border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);}
.pc-check{width:22px;height:22px;accent-color:#CC0000;cursor:pointer;flex-shrink:0;margin-top:2px;}
.pc-info{flex:1;min-width:0;}
.pc-name{font-size:14px;font-weight:600;line-height:1.4;}
.pc-city{font-size:11px;color:var(--mid);margin-top:2px;}
.pc-note{font-size:11px;color:var(--mid);margin-top:3px;font-style:italic;}
.pc-done .pc-name{text-decoration:line-through;opacity:.45;}
.pc-del-btn{background:none;border:none;color:#CC0000;font-size:13px;padding:4px 6px;cursor:pointer;opacity:.5;flex-shrink:0;}
.pc-map-set-loc{background:none;border:1.5px solid #3B4CCA;border-radius:8px;color:#3B4CCA;font-size:10px;padding:3px 8px;cursor:pointer;margin-top:4px;font-family:'Noto Sans TC',sans-serif;display:inline-block;white-space:nowrap;}
.pc-map-toggle-btn{background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.35);border-radius:8px;color:white;font-size:11px;padding:4px 10px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;flex-shrink:0;white-space:nowrap;margin-left:auto;}
.pc-map-toggle-btn.active{background:rgba(255,255,255,.9);color:#CC0000;}
.mem-cmp-sel-dot{width:22px;height:22px;border-radius:50%;border:2.5px solid #CC0000;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:white;transition:background .15s;}
.mem-cmp-sel-dot.on{background:#CC0000;}
.mem-cmp-row{display:flex;border-bottom:1px solid #f0e8dc;padding:8px 0;gap:6px;}
.mem-cmp-label{font-size:11px;color:var(--mid);width:64px;flex-shrink:0;padding-top:2px;}
.mem-cmp-cell{flex:1;font-size:12px;font-weight:600;color:var(--deep);}
.mem-cmp-minibar{height:8px;border-radius:4px;margin-top:3px;transition:width .4s;}
.pc-visit-date{font-size:11px;color:var(--mid);margin-top:4px;}
.pc-visit-date input[type=date]{border:1px solid #FFE082;border-radius:6px;padding:3px 6px;font-size:11px;background:var(--light);color:var(--deep);font-family:var(--sans,sans-serif);}
.pc-region-header{font-size:11px;font-weight:700;color:#CC0000;letter-spacing:.08em;padding:12px 4px 6px;margin-top:4px;border-top:1px solid var(--warm);}
.pc-region-header:first-child{border-top:none;margin-top:0;padding-top:4px;}
</style>
</head>

<div id="setup-screen">
  <button class="setup-back" onclick="showHome()">← 返回</button>
  <div class="setup-title">新增旅行計畫</div>
  <div class="setup-sub">規劃你的完美冒險旅程</div>
  <div class="setup-card">
    <div class="field-group"><label class="field-label">目的地</label><input class="field-input" id="dest-input" placeholder="例：東京、首爾、曼谷"/></div>
    <div class="field-row">
      <div class="field-group"><label class="field-label">出發日期</label><input class="field-input" type="date" id="start-date"/></div>
      <div class="field-group"><label class="field-label">回程日期</label><input class="field-input" type="date" id="end-date"/></div>
    </div>
    <div class="field-row">
      <div class="field-group"><label class="field-label">當地貨幣</label>
        <select class="field-input" id="currency-select">
          <option value="JPY">JPY 日幣</option><option value="KRW">KRW 韓元</option><option value="THB">THB 泰銖</option>
          <option value="USD">USD 美金</option><option value="EUR">EUR 歐元</option><option value="HKD">HKD 港幣</option>
          <option value="SGD">SGD 新幣</option><option value="VND">VND 越南盾</option><option value="MYR">MYR 馬幣</option>
        </select>
      </div>
      <div class="field-group"><label class="field-label">旅遊預算（可選）</label>
        <input class="field-input" type="number" inputmode="decimal" id="budget-input" placeholder="不填 = 不設定" min="0"/>
      </div>
    </div>
    <button class="btn-start" onclick="startTrip()">開始冒險 ▶</button>
  </div>
</div>

<div id="app">
  <div class="app-header">
    <div class="header-top">
      <div style="display:flex;align-items:flex-start;gap:8px">
        <button class="header-btn" onclick="showHome()" style="font-size:14px;padding:5px 10px">←</button>
        <div><div class="trip-name" id="header-dest"></div><div class="trip-dates" id="header-dates"></div></div>
      </div>
      <div class="header-btns">
        <button class="header-btn" id="edit-btn" onclick="toggleEditMode()">✏️ 編輯</button>
        <div style="position:relative">
          <button class="header-btn" onclick="toggleAppMenu(event)">⋯</button>
          <div id="app-menu" style="display:none;position:absolute;right:0;top:calc(100% + 4px);background:#222;border:1px solid rgba(255,255,255,.15);border-radius:10px;min-width:120px;z-index:999;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.4)">
            <button onclick="openExportModal();closeAppMenu()" style="display:block;width:100%;text-align:left;padding:10px 14px;background:none;border:none;color:white;font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif">📤 匯出</button>
            <button onclick="backupAll();closeAppMenu()" style="display:block;width:100%;text-align:left;padding:10px 14px;background:none;border:none;color:white;font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif">💾 備份資料</button>
            <button onclick="triggerRestore();closeAppMenu()" style="display:block;width:100%;text-align:left;padding:10px 14px;background:none;border:none;color:white;font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif">📂 還原備份</button>
            <button onclick="archiveMemory();closeAppMenu()" style="display:block;width:100%;text-align:left;padding:10px 14px;background:none;border:none;color:#FFD700;font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-weight:700;border-top:1px solid rgba(255,255,255,.08)">⭐ 保留回憶</button>
            <button onclick="resetTrip();closeAppMenu()" style="display:block;width:100%;text-align:left;padding:10px 14px;background:none;border:none;color:#ff6b6b;font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;border-top:1px solid rgba(255,255,255,.08)">🗑 重設</button>
          </div>
        </div>
      </div>
    </div>

<!-- MEMORIES SCREEN -->
<div id="memories-screen" style="display:none;min-height:100vh;flex-direction:column;background:var(--light)">
  <div style="background:#CC0000;padding:16px;display:flex;align-items:center;gap:12px;border-bottom:3px solid #990000;position:sticky;top:0;z-index:100">
    <button onclick="showHome()" style="background:rgba(255,255,255,.15);border:none;border-radius:10px;color:white;padding:8px 14px;font-family:'Noto Sans TC',sans-serif;font-size:13px;cursor:pointer;white-space:nowrap">← 返回</button>
    <div style="font-family:'Press Start 2P',monospace;font-size:11px;color:white;line-height:1.7;text-shadow:1px 1px 0 rgba(0,0,0,.3);flex:1">⭐ 美好回憶</div>
    <button onclick="document.getElementById('xlsx-import-input').click()" style="background:rgba(255,255,255,.15);border:none;border-radius:10px;color:white;padding:8px 12px;font-family:'Noto Sans TC',sans-serif;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0">📥 匯入</button>
    <button id="mem-cmp-btn" onclick="toggleMemCompare()" style="background:rgba(255,255,255,.15);border:none;border-radius:10px;color:white;padding:8px 12px;font-family:'Noto Sans TC',sans-serif;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0">📊 比較</button>
  </div>
  <div id="mem-list" style="padding:16px;flex:1"></div>
</div>

<!-- MEMORY VIEW OVERLAY -->
<div id="mem-view-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;flex-direction:column" onclick="if(event.target===this)closeMemView()">
  <div style="background:var(--light);flex:1;overflow-y:auto;max-width:480px;width:100%;margin:0 auto;display:flex;flex-direction:column">
    <div style="background:#CC0000;padding:16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;border-bottom:3px solid #990000">
      <button onclick="closeMemView()" style="background:rgba(255,255,255,.15);border:none;border-radius:10px;color:white;padding:8px 12px;font-family:'Noto Sans TC',sans-serif;font-size:13px;cursor:pointer;white-space:nowrap">✕ 關閉</button>
      <div id="mem-view-title" style="font-family:'Press Start 2P',monospace;font-size:11px;color:white;line-height:1.7;flex:1"></div>
      <button onclick="copyMemToTrip()" style="background:rgba(255,255,255,.15);border:none;border-radius:10px;color:white;padding:8px 10px;font-family:'Noto Sans TC',sans-serif;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0">✏️ 複製編輯</button>
      <div style="position:relative;flex-shrink:0">
        <button onclick="toggleMemExportMenu(event)" style="background:rgba(255,255,255,.15);border:none;border-radius:10px;color:white;padding:8px 12px;font-family:'Noto Sans TC',sans-serif;font-size:13px;cursor:pointer">📤</button>
        <div id="mem-export-menu" style="display:none;position:absolute;right:0;top:calc(100% + 4px);background:#222;border:1px solid rgba(255,255,255,.15);border-radius:10px;min-width:130px;z-index:999;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.4)">
          <button onclick="exportMemCSV()" style="display:block;width:100%;text-align:left;padding:10px 14px;background:none;border:none;color:white;font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif">📊 Excel / CSV</button>
          <button onclick="exportMemPDF()" style="display:block;width:100%;text-align:left;padding:10px 14px;background:none;border:none;color:white;font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;border-top:1px solid rgba(255,255,255,.08)">🖨️ 列印 / PDF</button>
        </div>
      </div>
    </div>
    <div id="mem-view-body" style="padding:16px"></div>
  </div>
</div>

<!-- ADD EXPENSE MODAL -->
<div class="modal-overlay" id="add-exp-modal" onclick="if(event.target===this)closeAddExpModal()">

    <div style="font-size:12px;color:var(--mid);margin-bottom:6px">名稱</div>

/* ── DRUM ── */
function Drum(el,items,initIdx,onChange){
  var idx=((initIdx%items.length)+items.length)%items.length;
  function render(){
    var html='<div class="drum-sel-bar"></div><div class="drum-inner">';
    for(var o=-1;o<=1;o++){
      var i=((idx+o)%items.length+items.length)%items.length;
      html+='<div class="drum-item'+(o===0?' sel':'')+'" data-i="'+i+'">'+items[i]+'</div>';
    }
    html+='</div>';
    el.innerHTML=html;
    el._items=items;el._idx=idx;el._cb=onChange;
    el.querySelectorAll('.drum-item').forEach(function(d){
      d.addEventListener('click',function(){
        var diff=+d.dataset.i-idx;
        if(Math.abs(diff)>items.length/2)diff=diff>0?diff-items.length:diff+items.length;
        idx=((idx+diff)%items.length+items.length)%items.length;
        render();onChange(idx);
      });
    });
  }
  render();
  var sy=0,ly=0;
  el.addEventListener('touchstart',function(e){sy=ly=e.touches[0].clientY;},{passive:true});
  el.addEventListener('touchmove',function(e){
    var dy=ly-e.touches[0].clientY;ly=e.touches[0].clientY;
    if(Math.abs(dy)>10){idx=((idx+(dy>0?1:-1))%items.length+items.length)%items.length;render();onChange(idx);}
  },{passive:true});
  el.addEventListener('wheel',function(e){e.preventDefault();idx=((idx+(e.deltaY>0?1:-1))%items.length+items.length)%items.length;render();onChange(idx);},{passive:false});
}

function buildDurDrum(cid,initH,initM,cbH,cbM){
  var c=document.getElementById(cid);if(!c)return;
  var hrs=[],mins=[];
  for(var i=0;i<=12;i++)hrs.push(i+'小時');
  for(var i=0;i<60;i+=5)mins.push((''+i).padStart(2,'0')+'分');
  c.innerHTML='<div class="drum-group">'+
    '<div class="drum-col"><div class="drum" id="'+cid+'_h"></div><div class="drum-col-label">小時</div></div>'+
    '<div class="drum-col"><div class="drum" id="'+cid+'_m"></div><div class="drum-col-label">分鐘</div></div>'+
  '</div>';
  Drum(document.getElementById(cid+'_h'),hrs,Math.min(initH,12),function(i){cbH(i);});
  Drum(document.getElementById(cid+'_m'),mins,Math.round(Math.min(initM,55)/5),function(i){cbM(i*5);});
}

function doMemCompare(){
  if(memCompareSelected.length<2)return;
  var mems=memCompareSelected.map(function(id){return memories.filter(function(m){return m.id===id;})[0];}).filter(Boolean);
  var list=document.getElementById('mem-list');
  var CAT_COLORS=['#CC0000','#3B4CCA','#FF9800','#4CAF50','#9C27B0','#00BCD4','#795548','#E91E63'];
  // Build per-memory stats
  var stats=mems.map(function(m,mi){
    var days=m.trip.days?m.trip.days.length:0;
    var tot=m.expenses?m.expenses.reduce(function(s,e){return s+e.amount;},0):0;
    var avg=days?Math.round(tot/days):0;
    // category breakdown
    var catMap={};
    if(m.expenses)m.expenses.forEach(function(e){catMap[e.cat]=(catMap[e.cat]||0)+e.amount;});
    var cats=Object.keys(catMap).sort(function(a,b){return catMap[b]-catMap[a];}).slice(0,5);
    return{m:m,days:days,tot:tot,avg:avg,catMap:catMap,cats:cats,color:CAT_COLORS[mi%CAT_COLORS.length]};
  });
  // Build HTML
  var colW=Math.floor(100/mems.length);
  // Header row
  var headCells=stats.map(function(s){
    return'<div class="mem-cmp-cell" style="color:'+s.color+';font-size:10px;line-height:1.5">'+
      '<div style="font-family:monospace;font-weight:700">'+escHtml(s.m.trip.dest)+'</div>'+
      '<div style="font-weight:400;color:#888;font-size:10px">'+s.m.trip.startDate.replace(/-/g,'/')+'</div>'+
    '</div>';
  }).join('');
  // Data rows
  function row(label,cells){
    return'<div class="mem-cmp-row"><div class="mem-cmp-label">'+label+'</div>'+cells.join('')+'</div>';
  }
  var daysRow=row('天數',stats.map(function(s){return'<div class="mem-cmp-cell">'+s.days+' 天</div>';}));
  var curRow=row('幣別',stats.map(function(s){return'<div class="mem-cmp-cell">'+escHtml(s.m.trip.currency||'JPY')+'</div>';}));
  var totRow=row('總花費',stats.map(function(s){return'<div class="mem-cmp-cell">'+s.tot.toLocaleString()+'</div>';}));
  var avgRow=row('每日均費',stats.map(function(s){return'<div class="mem-cmp-cell">'+s.avg.toLocaleString()+'</div>';}));
  // Category breakdown — collect all cats across all mems
  var allCats={};
  stats.forEach(function(s){Object.keys(s.catMap).forEach(function(c){allCats[c]=(allCats[c]||0)+s.catMap[c];});});
  var topCats=Object.keys(allCats).sort(function(a,b){return allCats[b]-allCats[a];}).slice(0,5);
  var catRows=topCats.map(function(cat){
    var cells=stats.map(function(s){
      var pct=s.tot?Math.round((s.catMap[cat]||0)/s.tot*100):0;
      var amt=s.catMap[cat]||0;
      return'<div class="mem-cmp-cell">'+
        '<div style="font-size:11px">'+pct+'% <span style="color:#888;font-weight:400">'+(amt?amt.toLocaleString():'—')+'</span></div>'+
        '<div class="mem-cmp-minibar" style="width:'+pct+'%;background:'+s.color+'"></div>'+
      '</div>';
    });
    return row(cat,cells);
  }).join('');
  // PC visits
  var pcRows='';
  var anyPCV=stats.some(function(s){return s.m.pokeCenterVisits&&s.m.pokeCenterVisits.length;});
  if(anyPCV){
    pcRows=row('中心',stats.map(function(s){
      var n=s.m.pokeCenterVisits?s.m.pokeCenterVisits.length:0;
      return'<div class="mem-cmp-cell">'+n+' 間</div>';
    }));
  }
  var html='<div style="margin-bottom:12px;display:flex;align-items:center;gap:8px">'+
    '<button onclick="memCompareBack()" style="background:white;border:2px solid #ddd;border-radius:10px;padding:8px 14px;font-size:13px;cursor:pointer;font-family:sans-serif">← 返回</button>'+
    '<div style="font-size:13px;font-weight:700;color:var(--deep)">旅行比較</div>'+
  '</div>'+
  '<div style="background:white;border-radius:16px;padding:16px;box-shadow:var(--shadow)">'+
    '<div class="mem-cmp-row" style="border-bottom:2px solid #CC0000;margin-bottom:4px"><div class="mem-cmp-label"></div>'+headCells+'</div>'+
    daysRow+curRow+totRow+avgRow+
    (topCats.length?'<div style="font-size:11px;font-weight:700;color:var(--mid);padding:10px 0 4px;letter-spacing:.08em">各類別</div>'+catRows:'')+
    pcRows+
  '</div>';
  list.innerHTML=html;
}

function startTrip(){
  var dest=document.getElementById('dest-input').value.trim();
  var s=document.getElementById('start-date').value,e=document.getElementById('end-date').value,c=document.getElementById('currency-select').value;
  if(!dest){alert('請輸入目的地');return;}if(!s||!e){alert('請選擇日期');return;}if(s>e){alert('日期有誤');return;}
  var budget=+(document.getElementById('budget-input').value)||0;
  trip={dest:dest,startDate:s,endDate:e,currency:c,days:genDays(s,e),budget:budget};
  initPrepDefaults();initWishDefaults();initPokeCenterDefaults();
  showApp();renderAll();fetchRate(c);saveData();
}
function genDays(s,e){
  var days=[],d=new Date(s),en=new Date(e),i=1;
  while(d<=en){days.push({label:'D'+i,date:(''+( d.getMonth()+1)).padStart(2,'0')+'/'+(''+d.getDate()).padStart(2,'0')});d.setDate(d.getDate()+1);i++;}
  return days;
}

/* ── FLIGHT ── */
function toggleFlightForm(){document.getElementById('flight-form').classList.toggle('open');}
function calcFlightDur(a,b){var d=(t2m(b)-t2m(a)+1440)%1440;return Math.floor(d/60)+'h'+(d%60?' '+d%60+'m':'');}
function genBarcode(){var s='';for(var i=0;i<20;i++){var w=Math.random()>.6?3:Math.random()>.4?2:1;var h=14+Math.random()*10;s+='<span style="width:'+w+'px;height:'+h+'px"></span>';}return s;}

function addFlight(){
  var dep=document.getElementById('fl-dep').value.trim().toUpperCase();
  var arr=document.getElementById('fl-arr').value.trim().toUpperCase();
  if(!dep||!arr){alert('請輸入機場代碼');return;}
  flights.push({id:uid(),dayIdx:currentDay,dep:dep,arr:arr,
    airline:document.getElementById('fl-airline').value.trim(),
    num:document.getElementById('fl-num').value.trim().toUpperCase(),
    depTime:document.getElementById('fl-dep-time').value,
    arrTime:document.getElementById('fl-arr-time').value,
    note:document.getElementById('fl-note').value.trim()});
  ['fl-dep','fl-arr','fl-airline','fl-num','fl-note'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('flight-form').classList.remove('open');
  renderFlightCards();renderTimeline();saveData();
}

          '<div class="bp-airport"><div class="bp-iata">'+f.dep+'</div><div class="bp-city">出發</div></div>'+

            '<div><div style="font-size:10px;opacity:.6;margin-bottom:3px">抵達</div><input type="time" class="bp-edit-time" id="bpat'+f.id+'" value="'+f.arrTime+'"></div>'+
          '</div>'+

          '<button class="bp-save-btn" onclick="saveBpEdit('+f.id+')">儲存航班</button>'+

function toggleBpEdit(id){openBpEditId=openBpEditId===id?null:id;renderFlightCards();}
function saveBpEdit(id){
  for(var i=0;i<flights.length;i++){
    if(flights[i].id===id){
      var f=flights[i];
      f.dep=(document.getElementById('bpd'+id).value||f.dep).trim().toUpperCase();
      f.arr=(document.getElementById('bpa'+id).value||f.arr).trim().toUpperCase();
      f.airline=document.getElementById('bpal'+id).value.trim();
      f.num=document.getElementById('bpn'+id).value.trim().toUpperCase();
      f.depTime=document.getElementById('bpdt'+id).value||f.depTime;
      f.arrTime=document.getElementById('bpat'+id).value||f.arrTime;
      f.note=document.getElementById('bpno'+id).value.trim();
      break;
    }
  }
  openBpEditId=null;renderFlightCards();renderTimeline();saveData();
}
function delFlight(id){flights=flights.filter(function(f){return f.id!==id;});renderFlightCards();renderTimeline();saveData();}

/* ── TIMELINE ── */
function getFirstStartMin(dayIdx){
  var di=dayIdx!=null?dayIdx:currentDay;
  if(dayStartTimes[di]!=null)return dayStartTimes[di];
  var df=flights.filter(function(f){return f.dayIdx===di;});
  if(df.length)return t2m(df[df.length-1].arrTime);
  return null;
}
function computeTimes(dayIdx){
  var di=dayIdx!=null?dayIdx:currentDay;
  var items=planItems.filter(function(p){return p.dayIdx===di;}).sort(function(a,b){return a.order-b.order;});
  var result=[];
  var firstMin=getFirstStartMin(di);
  if(firstMin==null)firstMin=9*60;
  for(var i=0;i<items.length;i++){
    var item=items[i];
    var startMin;
    if(i===0){
      startMin=firstMin;
    } else {
      var prev=result[i-1];
      var tc=getTcForDay(prev.id,di);
      startMin=(prev.endMin!=null?prev.endMin:prev.startMin)+(tc?tc.durMin:0);
    }
    result.push({id:item.id,name:item.name,cat:item.cat,note:item.note,stay:item.stay,startMin:startMin,endMin:item.stay?startMin+item.stay:null});
  }
  return result;
}
function getTcForDay(itemId,di){
  var d=di!=null?di:currentDay;
  for(var i=0;i<transports.length;i++){if(transports[i].dayIdx===d&&transports[i].afterItemId===itemId)return transports[i];}
  return null;
}
function getTc(itemId){return getTcForDay(itemId,currentDay);}

    '</div>';

        '<div class="plan-time-col"><div class="plan-time">'+startT+'</div>'+(endT?'<div class="plan-end-time">↓'+endT+'</div>':'')+
        '</div><div class="plan-body">'+
        '<div class="plan-name">'+item.name+'</div>'+
        (item.note?'<div class="plan-note-txt">'+item.note+'</div>':'')+

        '</div>'+

        '</div>'+
      '<div data-photoslot="plan-'+item.id+'"></div>'+
        (editMode?'<div class="plan-actions">'+
          '<button class="plan-edit-btn" onclick="toggleEditPanel('+item.id+')">✏️</button>'+
          '<button class="plan-copy-btn" onclick="toggleCopyPanel('+item.id+')" title="複製到其他天">📋</button>'+
          '<button class="plan-del" onclick="delPlan('+item.id+')">✕</button>'+
        '</div>':'')+
      '</div>'+
      (editMode?
        '<div class="plan-edit-panel'+(isEditOpen?' open':'')+'" id="ep'+item.id+'">'+
          '<input class="edit-input" id="en'+item.id+'" value="'+item.name+'" placeholder="名稱">'+

            '<button class="pin-set-btn" onclick="startMapPin('+item.id+')">📍 '+(hasPin?'更新地圖位置':'設定地圖位置')+'</button>'+
            (hasPin?'<button class="pin-remove-btn" onclick="removeMapPin('+item.id+')">✕ 移除</button>':'')+
          '</div>'+
          '<div style="display:flex;align-items:center;gap:8px;margin-top:8px">'+

          '<div class="edit-field-label" style="margin-bottom:8px">插入到當天</div>'+
          '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">'+

              var sdi=planItems.filter(function(p){return p.dayIdx===currentDay;}).sort(function(a,b){return a.order-b.order;});
              var btns='<button class="day-tab" style="font-size:11px;padding:5px 10px;white-space:nowrap" onclick="insertPlanSameDay('+item.id+',-1)">最前面</button>';
              sdi.forEach(function(sitem){btns+='<button class="day-tab" style="font-size:11px;padding:5px 10px;white-space:nowrap" onclick="insertPlanSameDay('+item.id+','+sitem.order+')">'+escHtml(sitem.name.slice(0,6))+'後</button>';});
              return btns;

              var dd=d.date.replace(/^0/,'').replace(/\/0/,'/');

      var tcKey='tc'+item.id,isOpen=openTcId===tcKey;
      var tcLabel=(['ship','metro','train','bike'].indexOf(tcMode)>=0&&tc&&tc.customLabel?tc.customLabel:mode.label);
      var tcNote=tc&&tc.note?tc.note:'';
      if(!editMode){
        html+='<div style="display:flex;align-items:flex-start;gap:8px;padding:4px 0 4px 8px;min-height:28px">'+
          '<div style="display:flex;flex-direction:column;align-items:center;padding-top:3px;flex-shrink:0">'+
            '<div style="width:2px;background:#FFE082;height:12px"></div>'+
            '<div style="width:2px;background:#FFE082;height:12px"></div>'+
          '</div>'+
          '<div style="display:flex;align-items:center;gap:6px;flex:1;flex-wrap:wrap">'+
            '<span style="font-size:15px;line-height:1">'+mode.icon+'</span>'+
            '<span style="font-size:12px;color:var(--mid)">'+escHtml(tcLabel)+(tcMin?' · '+durTxt(tcMin):'')+'</span>'+
            (tcNote?'<span style="font-size:11px;color:#aaa;font-style:italic">'+escHtml(tcNote)+'</span>':'')+
          '</div>'+
        '</div>';
      }else{
        html+='<div class="tc-wrap">'+
          '<div class="tc-spine"><div class="tc-vline"></div><div class="tc-circle"></div><div class="tc-vline"></div></div>'+
          '<div class="tc-card">'+
            '<div class="tc-summary clickable" onclick="toggleTc(\''+tcKey+'\')">'+
              '<span class="tc-icon-big">'+mode.icon+'</span>'+
              '<div class="tc-info"><div class="tc-mode-label">'+escHtml(tcLabel)+'</div>'+
              '<div class="tc-dur-label">'+(tcMin?durTxt(tcMin):'點此設定交通時間')+'</div></div>'+

            '</div>'+

              '<div class="tc-panel-title">選擇交通方式</div>'+
              '<div class="tc-mode-grid">'+MODES.map(function(m){return'<div class="tc-mode-btn'+(tcMode===m.key?' sel':'')+'" onclick="setMode('+item.id+',\''+m.key+'\')"><span class="tm-icon">'+m.icon+'</span><span class="tm-label">'+m.label+'</span></div>';}).join('')+'</div>'+

                '<input class="edit-input" id="ctn'+item.id+'" placeholder="'+(tcMode==='ship'?'例：纜車、渡輪...':'例：山手線、希望 500 號...')+'" value="'+(tc&&tc.customLabel?tc.customLabel:'')+'">'+
              '</div>'+

              '<input class="edit-input" id="tcnote'+item.id+'" placeholder="補充說明、注意事項..." value="'+escHtml(tcNote)+'" style="margin-bottom:10px">'+

      window._es[item.id]={h:sh,m:sm};
      buildDurDrum('edit-drum'+item.id,sh,sm,function(h){if(window._es[item.id])window._es[item.id].h=h;},function(m){if(window._es[item.id])window._es[item.id].m=m;});
    }
    if(openTcId==='tc'+item.id){
      var tc=getTc(item.id);
      var th=tc?Math.floor(tc.durMin/60):0,tm=tc?tc.durMin%60:0;
      if(!tcDrums[item.id])tcDrums[item.id]={h:th,m:tm};
      buildDurDrum('tcdrum'+item.id,th,tm,function(h){if(tcDrums[item.id])tcDrums[item.id].h=h;},function(m){if(tcDrums[item.id])tcDrums[item.id].m=m;});

function toggleEditPanel(id){openEditId=openEditId===id?null:id;renderTimeline();}
function saveEdit(id){
  for(var i=0;i<planItems.length;i++){
    if(planItems[i].id===id){
      var n=document.getElementById('en'+id),c=document.getElementById('ec'+id),no=document.getElementById('eno'+id);
      if(n&&n.value.trim())planItems[i].name=n.value.trim();
      if(c)planItems[i].cat=c.value;
      if(no)planItems[i].note=no.value.trim();
      var es=window._es&&window._es[id];
      if(es)planItems[i].stay=es.h*60+es.m;
      break;
    }
  }
  openEditId=null;renderTimeline();saveData();
}
function toggleTc(key){openTcId=openTcId===key?null:key;renderTimeline();}
function setMode(itemId,modeKey){
  var tc=getTc(itemId);
  if(!tc){tc={id:uid(),dayIdx:currentDay,afterItemId:itemId,mode:modeKey,durMin:0};transports.push(tc);}
  else tc.mode=modeKey;
  openTcId='tc'+itemId;
  renderTimeline();
  var cti=document.getElementById('cti'+itemId);
  if(cti)cti.style.display=['ship','metro','train','bike'].indexOf(modeKey)>=0?'block':'none';
}
function saveTc(itemId){
  var td=tcDrums[itemId]||{h:0,m:0};
  var durMin=td.h*60+td.m;
  var tc=getTc(itemId);
  if(!tc){tc={id:uid(),dayIdx:currentDay,afterItemId:itemId,mode:'walk',durMin:durMin};transports.push(tc);}
  else tc.durMin=durMin;
  var ctn=document.getElementById('ctn'+itemId);
  if(ctn&&ctn.value.trim())tc.customLabel=ctn.value.trim();else delete tc.customLabel;
  var tcnote=document.getElementById('tcnote'+itemId);
  if(tcnote&&tcnote.value.trim())tc.note=tcnote.value.trim();else delete tc.note;
  openTcId=null;renderTimeline();saveData();
}
function addPlanItem(){
  var name=document.getElementById('plan-name').value.trim();
  if(!name){alert('請輸入景點名稱');return;}
  var stay=stayH*60+stayM;
  var items=computeTimes();
  var startMin;
  if(items.length>0){
    var last=items[items.length-1];var tc=getTc(last.id);
    startMin=(last.endMin!=null?last.endMin:last.startMin)+(tc?tc.durMin:0);
  } else {
    var hasFlights=flights.some(function(f){return f.dayIdx===currentDay;});
    if(hasFlights){
      startMin=getFirstStartMin();
    } else {
      var fti=document.getElementById('first-item-time');
      startMin=fti&&fti.value?t2m(fti.value):9*60;
      dayStartTimes[currentDay]=startMin;
    }
  }
  planItems.push({id:uid(),dayIdx:currentDay,time:m2t(startMin),order:planItems.filter(function(p){return p.dayIdx===currentDay;}).length,name:name,cat:document.getElementById('plan-cat').value,note:document.getElementById('plan-note').value.trim(),stay:stay});
  document.getElementById('plan-name').value='';document.getElementById('plan-note').value='';
  var ftr=document.getElementById('first-time-row');if(ftr)ftr.style.display='none';
  renderTimeline();saveData();
}
function delPlan(id){
  planItems=planItems.filter(function(p){return p.id!==id;});
  transports=transports.filter(function(t){return t.afterItemId!==id;});
  planItems.filter(function(p){return p.dayIdx===currentDay;}).sort(function(a,b){return a.order-b.order;}).forEach(function(p,i){p.order=i;});
  renderTimeline();saveData();
}
function setDayStartTime(val){dayStartTimes[currentDay]=t2m(val);saveData();renderTimeline();}
function toggleCopyPanel(id){openCopyId=openCopyId===id?null:id;openEditId=null;renderTimeline();}
function insertPlanSameDay(itemId,insertAfterOrder){
  var orig=planItems.filter(function(p){return p.id===itemId;})[0];if(!orig)return;
  var insertOrder=insertAfterOrder+1;
  planItems.filter(function(p){return p.dayIdx===currentDay&&p.order>=insertOrder;}).forEach(function(p){p.order++;});
  var newItem={id:uid(),dayIdx:currentDay,time:orig.time,order:insertOrder,name:orig.name,cat:orig.cat,note:orig.note||'',stay:orig.stay||0};
  if(orig.lat!=null){newItem.lat=orig.lat;newItem.lng=orig.lng;}
  planItems.push(newItem);
  openCopyId=null;renderTimeline();saveData();
}
function copyPlanToDay(itemId,targetDay){
  var item=planItems.filter(function(p){return p.id===itemId;})[0];if(!item)return;
  var maxOrder=planItems.filter(function(p){return p.dayIdx===targetDay;}).reduce(function(m,p){return Math.max(m,p.order);}, -1);
  planItems.push({id:uid(),dayIdx:targetDay,time:item.time,order:maxOrder+1,name:item.name,cat:item.cat,note:item.note||'',stay:item.stay||0});
  openCopyId=null;
  renderTimeline();saveData();
}

function fetchRate(c){
  fetch('https://api.frankfurter.app/latest?from=TWD&to='+c)
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.rates&&d.rates[c]){exchangeRate=1/d.rates[c];updateRateDisplay();renderExpenses();}
      else fetchRateFallback(c);
    }).catch(function(){fetchRateFallback(c);});
}
function fetchRateFallback(c){
  fetch('https://open.er-api.com/v6/latest/TWD')
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.rates&&d.rates[c]){exchangeRate=1/d.rates[c];updateRateDisplay();}
      else setFR(c);
      renderExpenses();
    }).catch(function(){setFR(c);renderExpenses();});
}
function setFR(c){
  var fb={JPY:0.22,KRW:0.024,THB:0.9,USD:32,EUR:34,HKD:4.1,SGD:24,VND:0.0013,MYR:7};
  exchangeRate=fb[c]||1;
  updateRateDisplay();
}
function updateRateDisplay(){
  var el=document.getElementById('rate-display');
  if(el)el.textContent='1 '+trip.currency+' ≈ NT$ '+exchangeRate.toFixed(2);
}

/* ── CSV EXPORT/IMPORT ── */
function csvCell(s){s=''+(s==null?'':s);if(/[,"\n]/.test(s))s='"'+s.replace(/"/g,'""')+'"';return s;}
function csvRow(arr){return arr.map(csvCell).join(',');}
function exportTripData(tObj,pItems,tcs,fls,exps,fname){
  var lines=[];
  lines.push('[META]');
  lines.push(csvRow(['旅行名稱',tObj.dest||'']));
  lines.push(csvRow(['出發日期',tObj.startDate||'']));
  lines.push(csvRow(['回程日期',tObj.endDate||'']));
  lines.push(csvRow(['貨幣',tObj.currency||'JPY']));
  lines.push('');
  lines.push('[行程]');
  lines.push(csvRow(['天數','名稱','類別','備註','停留(分)','緯度','經度']));
  pItems.slice().sort(function(a,b){return a.dayIdx-b.dayIdx||a.order-b.order;}).forEach(function(p){
    lines.push(csvRow([p.dayIdx+1,p.name,p.cat,p.note||'',p.stayMin||0,p.lat!=null?p.lat:'',p.lng!=null?p.lng:'']));
  });
  lines.push('');
  lines.push('[交通]');
  lines.push(csvRow(['天數','行程順序','交通方式','時間(分)','費用']));
  tcs.forEach(function(tc){
    var dayItems=pItems.filter(function(p){return p.dayIdx===tc.dayIdx;}).sort(function(a,b){return a.order-b.order;});
    var fromIdx=dayItems.findIndex(function(p){return p.id===tc.afterItemId;});
    if(fromIdx<0)return;
    lines.push(csvRow([tc.dayIdx+1,fromIdx+1,tc.mode||'walk',tc.durMin||0,tc.cost||0]));
  });
  lines.push('');
  lines.push('[航班]');
  lines.push(csvRow(['天數','出發機場','抵達機場','航空','班號','起飛','降落']));
  fls.forEach(function(f){
    lines.push(csvRow([f.dayIdx+1,f.dep||'',f.arr||'',f.airline||'',f.num||'',f.depTime||'',f.arrTime||'']));
  });
  lines.push('');
  lines.push('[花費]');
  lines.push(csvRow(['天數','類別','名稱','金額']));
  exps.forEach(function(e){
    lines.push(csvRow([e.dayIdx+1,e.cat||'',e.name||'',e.amount||0]));
  });
  var blob=new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download=(fname||'trip')+'.csv';
  document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},500);
}

var CHART_COLORS={'🍜':'#FF9800','🚌':'#2196F3','🏨':'#9C27B0','🎫':'#4CAF50','🛍':'#E91E63','🧋':'#FFEB3B','💊':'#607D8B','🚑':'#F44336'};
var PIE_FALLBACK=['#FF9800','#2196F3','#9C27B0','#4CAF50','#E91E63','#FFEB3B','#607D8B','#F44336'];
function buildPieSVG(catMap,total){
  if(!total)return'';
  var cats=Object.keys(catMap).sort(function(a,b){return catMap[b]-catMap[a];});
  var size=120,cx=60,cy=60,r=52;
  var paths='';var startAngle=-Math.PI/2;
  cats.forEach(function(c,i){
    var pct=catMap[c]/total;if(!pct)return;
    var endAngle=startAngle+pct*2*Math.PI;
    var x1=cx+r*Math.cos(startAngle),y1=cy+r*Math.sin(startAngle);
    var x2=cx+r*Math.cos(endAngle),y2=cy+r*Math.sin(endAngle);
    var largeArc=pct>0.5?1:0;
    var color=CHART_COLORS[c]||PIE_FALLBACK[i%PIE_FALLBACK.length];
    paths+='<path d="M'+cx+' '+cy+' L'+x1.toFixed(1)+' '+y1.toFixed(1)+' A'+r+' '+r+' 0 '+largeArc+' 1 '+x2.toFixed(1)+' '+y2.toFixed(1)+' Z" fill="'+color+'"/>';
    startAngle=endAngle;
  });
  var legend=cats.map(function(c,i){
    var color=CHART_COLORS[c]||PIE_FALLBACK[i%PIE_FALLBACK.length];
    var pct2=Math.round(catMap[c]/total*100);
    var def=null;for(var k=0;k<EXP_CATS_DEF.length;k++){if(EXP_CATS_DEF[k].key===c){def=EXP_CATS_DEF[k];break;}}
    return'<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">'+
      '<div style="width:9px;height:9px;border-radius:2px;background:'+color+';flex-shrink:0"></div>'+
      '<span style="font-size:11px;color:#ccc">'+c+(def?' '+def.label:'')+' '+pct2+'%</span>'+
    '</div>';
  }).join('');
  return'<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.1)">'+
    '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+paths+'</svg>'+
    '<div style="flex:1;overflow:hidden">'+legend+'</div>'+
  '</div>';
}

    localStorage.setItem('tv_wish',JSON.stringify(wishItems));

  }catch(e){}
}
function loadData(){
  try{
    var t=localStorage.getItem('tv_trip');if(!t)return false;
    trip=JSON.parse(t);
    planItems=JSON.parse(localStorage.getItem('tv_plans')||'[]');
    transports=JSON.parse(localStorage.getItem('tv_tc')||'[]');
    flights=JSON.parse(localStorage.getItem('tv_flights')||'[]');
    expenses=JSON.parse(localStorage.getItem('tv_exp')||'[]');
    _id=+(localStorage.getItem('tv_id')||'1');

    prepItems=JSON.parse(localStorage.getItem('tv_prep')||'[]');
    wishItems=JSON.parse(localStorage.getItem('tv_wish')||'[]');
    pokeCenterItems=JSON.parse(localStorage.getItem('tv_pc')||'[]');
    if(!prepItems.length)initPrepDefaults();
    if(!pokeCenterItems.length){
      initPokeCenterDefaults();
    }else{
      var _pcDefaults=pokeCenterItems.filter(function(i){return !i.custom;});
      var _needsReset=_pcDefaults.length!==POKE_CENTERS_DEFAULT.length||_pcDefaults.some(function(i){return !i.region;});
      if(_needsReset){
        var _custom=pokeCenterItems.filter(function(i){return i.custom;});
        var _idC=1;
        pokeCenterItems=POKE_CENTERS_DEFAULT.map(function(c){
          return{id:_idC++,name:c.name,city:c.city,region:c.region||'',checked:false,note:'',custom:false};
        });
        var _maxId=pokeCenterItems.length;
        _custom.forEach(function(i){i.id=++_maxId;pokeCenterItems.push(i);});
        saveData();
      }
    }
    return true;
  }catch(e){return false;}
}

function doRestore(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!confirm('確定要還原備份？現有資料將被覆蓋。'))return;
      if(data.trip)trip=data.trip;
      if(data.plans)planItems=data.plans;
      if(data.tc)transports=data.tc;
      if(data.flights)flights=data.flights;
      if(data.exp)expenses=data.exp;
      if(data.id)_id=+data.id;
      if(data.dst)dayStartTimes=data.dst;
      if(data.mem)memories=data.mem;
      saveData();saveMemories();
      renderAll();
      alert('還原成功！');
    }catch(ex){alert('檔案格式錯誤，請確認是否為備份檔案。');}
  };
  reader.readAsText(file);
}

/* ── DRAG & DROP ── */
var dragSrcId=null;
function onDragStart(e,id){
  dragSrcId=id;
  e.dataTransfer.effectAllowed='move';
  setTimeout(function(){var el=document.querySelector('.plan-item[data-id="'+id+'"]');if(el)el.classList.add('dragging');},0);
}
function onDragEnd(e){
  var planEl=e.currentTarget.closest('.plan-item');
  if(planEl)planEl.classList.remove('dragging');
  document.querySelectorAll('.plan-item').forEach(function(el){el.classList.remove('drag-over');});
  dragSrcId=null;
}
function onDragOver(e,id){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.plan-item').forEach(function(el){el.classList.remove('drag-over');});
  if(dragSrcId!==id)e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e){e.currentTarget.classList.remove('drag-over');}
function onDrop(e,targetId){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!dragSrcId||dragSrcId===targetId)return;
  var dayItems=planItems.filter(function(p){return p.dayIdx===currentDay;}).sort(function(a,b){return a.order-b.order;});
  var srcIdx=dayItems.findIndex(function(p){return p.id===dragSrcId;});
  var tgtIdx=dayItems.findIndex(function(p){return p.id===targetId;});
  if(srcIdx<0||tgtIdx<0)return;
  var moved=dayItems.splice(srcIdx,1)[0];
  dayItems.splice(tgtIdx,0,moved);
  dayItems.forEach(function(p,i){p.order=i;});
  dragSrcId=null;renderTimeline();saveData();
}
/* Touch drag */
var touchDragId=null,touchGhost=null,touchOffX=0,touchOffY=0;
function onTouchStart(e,id){
  if(!editMode)return;
  e.preventDefault();
  touchDragId=id;
  var t=e.touches[0];
  var planEl=e.currentTarget.closest('.plan-item');
  var rect=planEl.getBoundingClientRect();
  touchOffX=t.clientX-rect.left;touchOffY=t.clientY-rect.top;
  touchGhost=planEl.cloneNode(true);
  touchGhost.style.cssText='position:fixed;left:'+(t.clientX-touchOffX)+'px;top:'+(t.clientY-touchOffY)+'px;width:'+rect.width+'px;opacity:.65;pointer-events:none;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.3);border-radius:var(--radius);';
  document.body.appendChild(touchGhost);
  planEl.classList.add('dragging');
}
function onTouchMove(e){
  if(!touchDragId)return;
  e.preventDefault();
  var t=e.touches[0];
  if(touchGhost){touchGhost.style.left=(t.clientX-touchOffX)+'px';touchGhost.style.top=(t.clientY-touchOffY)+'px';}
  touchGhost.style.display='none';
  var under=document.elementFromPoint(t.clientX,t.clientY);
  touchGhost.style.display='';
  document.querySelectorAll('.plan-item').forEach(function(el){el.classList.remove('drag-over');});
  var planEl=under?under.closest('.plan-item'):null;
  if(planEl&&+planEl.dataset.id!==touchDragId)planEl.classList.add('drag-over');
}
function onTouchEnd(e){
  if(!touchDragId)return;
  var t=e.changedTouches[0];
  if(touchGhost){touchGhost.remove();touchGhost=null;}
  var srcEl=document.querySelector('.plan-item[data-id="'+touchDragId+'"]');
  if(srcEl)srcEl.classList.remove('dragging');
  document.querySelectorAll('.plan-item').forEach(function(el){el.classList.remove('drag-over');});
  touchGhost&&(touchGhost.style.display='none');
  var under=document.elementFromPoint(t.clientX,t.clientY);
  var planEl=under?under.closest('.plan-item'):null;
  var targetId=planEl?+planEl.dataset.id:null;
  if(targetId&&targetId!==touchDragId){
    var dayItems=planItems.filter(function(p){return p.dayIdx===currentDay;}).sort(function(a,b){return a.order-b.order;});
    var srcIdx=dayItems.findIndex(function(p){return p.id===touchDragId;});
    var tgtIdx=dayItems.findIndex(function(p){return p.id===targetId;});
    if(srcIdx>=0&&tgtIdx>=0){
      var moved=dayItems.splice(srcIdx,1)[0];
      dayItems.splice(tgtIdx,0,moved);
      dayItems.forEach(function(p,i){p.order=i;});
      saveData();
    }
  }
  touchDragId=null;renderTimeline();
}

function bezierPts(a,b){
  var mlat=(a[0]+b[0])/2,mlng=(a[1]+b[1])/2;
  var dlat=b[0]-a[0],dlng=b[1]-a[1];
  var len=Math.sqrt(dlat*dlat+dlng*dlng);
  var off=len*0.18;
  var clat=mlat+(len>0.0001?-dlng*off/len:0);
  var clng=mlng+(len>0.0001?dlat*off/len:0);
  var pts=[];
  for(var i=0;i<=20;i++){var t=i/20;var u=1-t;pts.push([u*u*a[0]+2*u*t*clat+t*t*b[0],u*u*a[1]+2*u*t*clng+t*t*b[1]]);}
  return pts;
}
function renderMapPins(){
  if(!mapInstance)return;
  mapMarkers.forEach(function(m){m.remove();});mapMarkers=[];
  if(mapViewDay===-1){
    var allBounds=[];
    trip.days.forEach(function(day,di){
      var color=DAY_COLORS[di%DAY_COLORS.length];
      var items=computeTimes(di);
      var pinnedItems=[];
      items.forEach(function(item,idx){
        var pi=planItems.filter(function(p){return p.id===item.id;})[0];
        if(!pi||pi.lat==null){pinnedItems.push(null);return;}
        var icon=L.divIcon({className:'',html:'<div style="background:'+color+';color:white;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,.35)">'+(idx+1)+'</div>',iconSize:[26,26],iconAnchor:[13,13]});
        var marker=L.marker([pi.lat,pi.lng],{icon:icon});
        marker.bindPopup('<b>'+day.label+'-'+(idx+1)+'. '+escHtml(item.name)+'</b><br>'+m2t(item.startMin)+(item.endMin?'–'+m2t(item.endMin):'')+'<br><small>'+escHtml(item.cat)+'</small>');
        marker.addTo(mapInstance);mapMarkers.push(marker);
        allBounds.push([pi.lat,pi.lng]);
        pinnedItems.push({item:item,pi:pi});
      });
      for(var i=0;i<pinnedItems.length-1;i++){
        var from=pinnedItems[i],to=pinnedItems[i+1];
        if(!from||!to)continue;
        var pts=bezierPts([from.pi.lat,from.pi.lng],[to.pi.lat,to.pi.lng]);
        var line=L.polyline(pts,{color:color,weight:3,dashArray:'7,6',opacity:.8});
        line.addTo(mapInstance);mapMarkers.push(line);
      }
    });
    if(allBounds.length===1)mapInstance.setView(allBounds[0],15);
    else if(allBounds.length>1)mapInstance.fitBounds(allBounds,{padding:[40,40]});
    return;
  }
  var items=computeTimes(mapViewDay);
  var pinnedItems=[];
  var bounds=[];
  items.forEach(function(item,idx){
    var pi=planItems.filter(function(p){return p.id===item.id;})[0];
    if(!pi||pi.lat==null){pinnedItems.push(null);return;}
    var icon=L.divIcon({
      className:'',
      html:'<div style="background:#CC0000;color:white;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,.35)">'+(idx+1)+'</div>',
      iconSize:[26,26],iconAnchor:[13,13]
    });
    var marker=L.marker([pi.lat,pi.lng],{icon:icon});
    marker.bindPopup('<b>'+(idx+1)+'. '+escHtml(item.name)+'</b><br>'+m2t(item.startMin)+(item.endMin?'–'+m2t(item.endMin):'')+'<br><small>'+escHtml(item.cat)+'</small>');
    marker.addTo(mapInstance);mapMarkers.push(marker);
    bounds.push([pi.lat,pi.lng]);
    pinnedItems.push({item:item,pi:pi});
  });
  /* transport lines between consecutive pinned items */
  for(var i=0;i<pinnedItems.length-1;i++){
    var from=pinnedItems[i],to=pinnedItems[i+1];
    if(!from||!to)continue;
    var tc=getTcForDay(from.item.id,mapViewDay);
    var mode=tc?tc.mode:'walk';
    var color=MAP_MODE_COLORS[mode]||'#9E9E9E';
    var modeObj=MODES.filter(function(m){return m.key===mode;})[0]||MODES[0];
    var pts=bezierPts([from.pi.lat,from.pi.lng],[to.pi.lat,to.pi.lng]);
    var line=L.polyline(pts,{color:color,weight:3,dashArray:'7,6',opacity:.8});
    line.addTo(mapInstance);mapMarkers.push(line);
    /* midpoint label */
    var mid=pts[Math.floor(pts.length/2)];
    var durLabel=tc&&tc.durMin?durTxt(tc.durMin):'';
    var labelMarker=L.marker(mid,{
      icon:L.divIcon({
        className:'',
        html:'<div class="map-tc-label">'+modeObj.icon+(durLabel?' '+durLabel:'')+'</div>',
        iconSize:null,iconAnchor:[0,10]
      }),
      interactive:false
    });
    labelMarker.addTo(mapInstance);mapMarkers.push(labelMarker);
  }
  if(bounds.length===1)mapInstance.setView(bounds[0],15);
  else if(bounds.length>1)mapInstance.fitBounds(bounds,{padding:[40,40]});
}
