<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>旅行計畫</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="旅行計畫">
<meta name="theme-color" content="#C8703A">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #F5ECD7;
    --warm: #E8D5B0;
    --terracotta: #C8703A;
    --terra-dark: #9E4E22;
    --deep: #2C2416;
    --mid: #6B5744;
    --light: #FAF6EE;
    --green: #4A7C59;
    --red: #C0392B;
    --shadow: 0 4px 20px rgba(44,36,22,0.12);
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--light);
    color: var(--deep);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* SETUP SCREEN */
  #setup-screen {
    min-height: 100vh;
    background: linear-gradient(160deg, #2C2416 0%, #6B3A1F 50%, #C8703A 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    position: relative;
    overflow: hidden;
  }
  #setup-screen::before {
    content: '';
    position: absolute;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    top: -80px; right: -80px;
  }
  #setup-screen::after {
    content: '';
    position: absolute;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    bottom: 40px; left: -60px;
  }
  .setup-title {
    font-family: 'Playfair Display', serif;
    color: var(--sand);
    font-size: 36px;
    text-align: center;
    margin-bottom: 8px;
    position: relative; z-index:1;
  }
  .setup-sub {
    color: rgba(245,236,215,0.6);
    font-size: 14px;
    text-align: center;
    margin-bottom: 40px;
    position: relative; z-index:1;
  }
  .setup-card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 28px 24px;
    width: 100%;
    position: relative; z-index:1;
  }
  .field-group { margin-bottom: 20px; }
  .field-label {
    color: rgba(245,236,215,0.8);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }
  .field-input {
    width: 100%;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    color: var(--sand);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 15px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field-input:focus { border-color: rgba(200,112,58,0.8); }
  .field-input::placeholder { color: rgba(245,236,215,0.35); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  select.field-input option { background: #3a2a1a; color: #f5ecd7; }
  .btn-start {
    width: 100%;
    background: var(--terracotta);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.05em;
  }
  .btn-start:active { transform: scale(0.98); background: var(--terra-dark); }

  /* MAIN APP */
  #app { display: none; flex-direction: column; min-height: 100vh; }

  /* HEADER */
  .app-header {
    background: var(--deep);
    color: var(--sand);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 4px;
  }
  .trip-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--sand);
  }
  .trip-dates {
    font-size: 12px;
    color: rgba(245,236,215,0.55);
    margin-top: 2px;
  }
  .header-reset {
    background: rgba(255,255,255,0.08);
    border: none;
    border-radius: 8px;
    color: rgba(245,236,215,0.6);
    font-size: 12px;
    padding: 6px 10px;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
  }

  /* TAB BAR */
  .tab-bar {
    background: var(--deep);
    display: flex;
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 0 4px 4px;
    position: sticky;
    bottom: 0;
    z-index: 100;
    order: 10;
  }
  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    color: rgba(245,236,215,0.4);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 11px;
    padding: 10px 4px 6px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: color 0.2s;
  }
  .tab-btn.active { color: var(--terracotta); }
  .tab-icon { font-size: 20px; line-height: 1; }

  /* CONTENT */
  .tab-content { display: none; flex: 1; padding: 16px; }
  .tab-content.active { display: block; }

  /* DAY TABS */
  .day-tabs-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin: 0 -16px;
    padding: 0 16px;
    scrollbar-width: none;
    margin-bottom: 16px;
  }
  .day-tabs-wrap::-webkit-scrollbar { display: none; }
  .day-tabs {
    display: flex;
    gap: 8px;
    white-space: nowrap;
    padding-bottom: 4px;
  }
  .day-tab {
    background: white;
    border: 2px solid var(--warm);
    border-radius: 10px;
    color: var(--mid);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    padding: 7px 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .day-tab.active {
    background: var(--terracotta);
    border-color: var(--terracotta);
    color: white;
    font-weight: 600;
  }

  /* PLAN ITEMS */
  .plan-items { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .plan-item {
    background: white;
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: var(--shadow);
    display: flex;
    gap: 12px;
    align-items: flex-start;
    position: relative;
  }
  .plan-time {
    font-size: 13px;
    font-weight: 700;
    color: var(--terracotta);
    min-width: 44px;
    margin-top: 2px;
  }
  .plan-body { flex: 1; min-width: 0; }
  .plan-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--deep);
    margin-bottom: 4px;
  }
  .plan-note {
    font-size: 12px;
    color: var(--mid);
    line-height: 1.4;
  }
  .plan-cat {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--warm);
    color: var(--mid);
    display: inline-block;
    margin-top: 4px;
  }
  .plan-del {
    background: none;
    border: none;
    color: #ddd;
    font-size: 18px;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 6px;
    line-height: 1;
    transition: color 0.2s;
  }
  .plan-del:active { color: var(--red); }
  .transport-line {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 16px;
    margin: -4px 0;
  }
  .transport-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--warm); }
  .transport-label { font-size: 11px; color: var(--mid); }

  /* ADD FORM */
  .add-card {
    background: white;
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }
  .add-card h3 {
    font-size: 14px;
    font-weight: 600;
    color: var(--mid);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .form-input {
    width: 100%;
    border: 1.5px solid var(--warm);
    border-radius: 10px;
    padding: 10px 12px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    color: var(--deep);
    outline: none;
    background: var(--light);
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--terracotta); }
  .btn-add {
    width: 100%;
    background: var(--terracotta);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 4px;
  }
  .btn-add:active { background: var(--terra-dark); }

  /* EXPENSE */
  .expense-summary {
    background: var(--deep);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    color: var(--sand);
  }
  .expense-total-label { font-size: 12px; opacity: 0.6; margin-bottom: 4px; }
  .expense-total-amount { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--sand); }
  .expense-twd { font-size: 13px; opacity: 0.55; margin-top: 4px; }
  .expense-rate { font-size: 11px; opacity: 0.4; margin-top: 2px; }
  .expense-by-day {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 4px;
    margin-top: 14px;
  }
  .expense-by-day::-webkit-scrollbar { display: none; }
  .day-expense-chip {
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 8px 12px;
    min-width: 72px;
    flex-shrink: 0;
    text-align: center;
  }
  .dec-day { font-size: 11px; opacity: 0.55; margin-bottom: 2px; }
  .dec-amt { font-size: 13px; font-weight: 600; }

  .expense-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .expense-item {
    background: white;
    border-radius: 12px;
    padding: 12px 14px;
    box-shadow: 0 2px 8px rgba(44,36,22,0.07);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .expense-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--warm);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .expense-info { flex: 1; min-width: 0; }
  .expense-name { font-size: 14px; font-weight: 600; color: var(--deep); }
  .expense-day-tag { font-size: 11px; color: var(--mid); }
  .expense-amount { font-size: 15px; font-weight: 700; color: var(--terracotta); }
  .expense-del {
    background: none; border: none;
    color: #ddd; font-size: 16px;
    cursor: pointer; padding: 2px;
    line-height: 1;
  }
  .expense-del:active { color: var(--red); }

  /* MAP */
  #map-container {
    border-radius: var(--radius);
    overflow: hidden;
    height: 280px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    background: var(--warm);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    color: var(--mid);
    font-size: 14px;
    position: relative;
  }
  #map-container iframe {
    width: 100%; height: 100%;
    border: none;
    position: absolute;
    top: 0; left: 0;
  }
  .map-spots { display: flex; flex-direction: column; gap: 8px; }
  .map-spot-item {
    background: white;
    border-radius: 12px;
    padding: 12px 14px;
    box-shadow: 0 2px 8px rgba(44,36,22,0.07);
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .map-spot-item:active { background: var(--light); }
  .spot-pin {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--terracotta);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .spot-info { flex: 1; }
  .spot-name { font-size: 14px; font-weight: 600; }
  .spot-day { font-size: 12px; color: var(--mid); }
  .spot-map-btn {
    font-size: 12px;
    color: var(--terracotta);
    background: rgba(200,112,58,0.1);
    border: none;
    border-radius: 8px;
    padding: 5px 10px;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
  }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--mid);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; opacity: 0.7; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(44,36,22,0.6);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: white;
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-handle {
    width: 40px; height: 4px;
    background: var(--warm);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <div class="setup-title">✈ 旅行計畫</div>
  <div class="setup-sub">規劃你的完美旅程</div>
  <div class="setup-card">
    <div class="field-group">
      <label class="field-label">目的地</label>
      <input class="field-input" id="dest-input" placeholder="例：東京、首爾、曼谷" />
    </div>
    <div class="field-row">
      <div class="field-group">
        <label class="field-label">出發日期</label>
        <input class="field-input" type="date" id="start-date" />
      </div>
      <div class="field-group">
        <label class="field-label">回程日期</label>
        <input class="field-input" type="date" id="end-date" />
      </div>
    </div>
    <div class="field-group">
      <label class="field-label">當地貨幣</label>
      <select class="field-input" id="currency-select">
        <option value="JPY">JPY 日幣</option>
        <option value="KRW">KRW 韓元</option>
        <option value="THB">THB 泰銖</option>
        <option value="USD">USD 美金</option>
        <option value="EUR">EUR 歐元</option>
        <option value="HKD">HKD 港幣</option>
        <option value="SGD">SGD 新幣</option>
        <option value="VND">VND 越南盾</option>
        <option value="MYR">MYR 馬幣</option>
      </select>
    </div>
    <button class="btn-start" onclick="startTrip()">開始規劃 →</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="app-header">
    <div class="header-top">
      <div>
        <div class="trip-name" id="header-dest">東京</div>
        <div class="trip-dates" id="header-dates"></div>
      </div>
      <button class="header-reset" onclick="resetTrip()">重新設定</button>
    </div>
  </div>

  <!-- TAB CONTENTS -->
  <div class="tab-content active" id="tab-plan">
    <div class="day-tabs-wrap">
      <div class="day-tabs" id="day-tabs"></div>
    </div>
    <div class="plan-items" id="plan-items"></div>
    <div class="add-card">
      <h3>新增行程</h3>
      <input class="form-input" id="plan-name" placeholder="景點 / 活動名稱" style="margin-bottom:10px;width:100%">
      <div class="form-row">
        <input class="form-input" type="time" id="plan-time" value="09:00">
        <select class="form-input" id="plan-cat">
          <option value="🏛 景點">🏛 景點</option>
          <option value="🍜 餐廳">🍜 餐廳</option>
          <option value="🛍 購物">🛍 購物</option>
          <option value="🏨 住宿">🏨 住宿</option>
          <option value="🚌 交通">🚌 交通</option>
          <option value="☕ 咖啡">☕ 咖啡</option>
          <option value="🎭 體驗">🎭 體驗</option>
        </select>
      </div>
      <input class="form-input" id="plan-note" placeholder="備註（可選）" style="margin-bottom:10px;width:100%">
      <button class="btn-add" onclick="addPlanItem()">＋ 加入行程</button>
    </div>
  </div>

  <div class="tab-content" id="tab-expense">
    <div class="expense-summary">
      <div class="expense-total-label">總花費</div>
      <div class="expense-total-amount" id="total-amount">0</div>
      <div class="expense-twd" id="total-twd">≈ NT$ 0</div>
      <div class="expense-rate" id="rate-display">匯率載入中...</div>
      <div class="expense-by-day" id="day-expenses"></div>
    </div>
    <div class="add-card">
      <h3>新增支出</h3>
      <input class="form-input" id="exp-name" placeholder="項目名稱" style="margin-bottom:10px;width:100%">
      <div class="form-row">
        <input class="form-input" type="number" id="exp-amount" placeholder="金額">
        <select class="form-input" id="exp-cat">
          <option value="🍜">🍜 餐飲</option>
          <option value="🚌">🚌 交通</option>
          <option value="🏛">🏛 門票</option>
          <option value="🛍">🛍 購物</option>
          <option value="🏨">🏨 住宿</option>
          <option value="💊">💊 其他</option>
        </select>
      </div>
      <button class="btn-add" onclick="addExpense()">＋ 加入支出</button>
    </div>
    <div class="expense-list" id="expense-list"></div>
  </div>

  <div class="tab-content" id="tab-map">
    <div id="map-container">
      <div id="map-placeholder" style="text-align:center">
        <div style="font-size:40px;margin-bottom:8px">🗺</div>
        <div>點擊景點可開啟地圖</div>
      </div>
    </div>
    <div class="map-spots" id="map-spots"></div>
  </div>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('plan', this)">
      <span class="tab-icon">📅</span>行程
    </button>
    <button class="tab-btn" onclick="switchTab('expense', this)">
      <span class="tab-icon">💰</span>記帳
    </button>
    <button class="tab-btn" onclick="switchTab('map', this)">
      <span class="tab-icon">🗺</span>地圖
    </button>
  </div>
</div>

<script>
let trip = { dest: '', startDate: '', endDate: '', currency: 'JPY', days: [] };
let planItems = []; // { dayIdx, time, name, cat, note }
let expenses = []; // { dayIdx, name, amount, cat }
let currentDay = 0;
let exchangeRate = null;

function startTrip() {
  const dest = document.getElementById('dest-input').value.trim();
  const start = document.getElementById('start-date').value;
  const end = document.getElementById('end-date').value;
  const currency = document.getElementById('currency-select').value;
  if (!dest) { alert('請輸入目的地'); return; }
  if (!start || !end) { alert('請選擇日期'); return; }
  if (start > end) { alert('出發日期不能晚於回程'); return; }

  trip.dest = dest;
  trip.startDate = start;
  trip.endDate = end;
  trip.currency = currency;
  trip.days = generateDays(start, end);

  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('app').style.flexDirection = 'column';

  document.getElementById('header-dest').textContent = dest;
  document.getElementById('header-dates').textContent = `${start.replace(/-/g,'/')} → ${end.replace(/-/g,'/')} (${trip.days.length}天)`;

  renderDayTabs();
  renderPlanItems();
  renderExpenses();
  renderMapSpots();
  fetchRate(currency);
}

function generateDays(start, end) {
  const days = [];
  let d = new Date(start);
  const e = new Date(end);
  let i = 1;
  while (d <= e) {
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    days.push({ label: `D${i}`, date: `${mm}/${dd}` });
    d.setDate(d.getDate()+1); i++;
  }
  return days;
}

function renderDayTabs() {
  const wrap = document.getElementById('day-tabs');
  wrap.innerHTML = trip.days.map((d,i) =>
    `<button class="day-tab ${i===currentDay?'active':''}" onclick="selectDay(${i})">${d.label}<br><span style="font-size:11px;opacity:0.7">${d.date}</span></button>`
  ).join('');
}

function selectDay(i) {
  currentDay = i;
  renderDayTabs();
  renderPlanItems();
}

function renderPlanItems() {
  const items = planItems.filter(p => p.dayIdx === currentDay)
    .sort((a,b) => a.time.localeCompare(b.time));
  const wrap = document.getElementById('plan-items');
  if (!items.length) {
    wrap.innerHTML = `<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">還沒有行程，新增第一個吧！</div></div>`;
    return;
  }
  wrap.innerHTML = items.map((item, idx) => {
    const globalIdx = planItems.indexOf(item);
    return `<div class="plan-item">
      <div class="plan-time">${item.time}</div>
      <div class="plan-body">
        <div class="plan-name">${item.name}</div>
        ${item.note ? `<div class="plan-note">${item.note}</div>` : ''}
        <div class="plan-cat">${item.cat}</div>
      </div>
      <button class="plan-del" onclick="deletePlan(${globalIdx})">✕</button>
    </div>`;
  }).join('');
}

function addPlanItem() {
  const name = document.getElementById('plan-name').value.trim();
  if (!name) { alert('請輸入景點名稱'); return; }
  planItems.push({
    dayIdx: currentDay,
    time: document.getElementById('plan-time').value,
    name,
    cat: document.getElementById('plan-cat').value,
    note: document.getElementById('plan-note').value.trim()
  });
  document.getElementById('plan-name').value = '';
  document.getElementById('plan-note').value = '';
  renderPlanItems();
  renderMapSpots();
}

function deletePlan(i) {
  planItems.splice(i, 1);
  renderPlanItems();
  renderMapSpots();
}

async function fetchRate(currency) {
  try {
    const r = await fetch(`https://open.er-api.com/v6/latest/TWD`);
    const data = await r.json();
    if (data.rates && data.rates[currency]) {
      exchangeRate = 1 / data.rates[currency];
      document.getElementById('rate-display').textContent = `1 ${currency} ≈ NT$ ${exchangeRate.toFixed(2)}`;
    } else {
      setFallbackRate(currency);
    }
  } catch {
    setFallbackRate(currency);
  }
  renderExpenses();
}

function setFallbackRate(currency) {
  const fallback = { JPY: 0.22, KRW: 0.024, THB: 0.9, USD: 32, EUR: 34, HKD: 4.1, SGD: 24, VND: 0.0013, MYR: 7 };
  exchangeRate = fallback[currency] || 1;
  document.getElementById('rate-display').textContent = `1 ${trip.currency} ≈ NT$ ${exchangeRate.toFixed(2)}（估算）`;
}

function renderExpenses() {
  const list = document.getElementById('expense-list');
  const totalEl = document.getElementById('total-amount');
  const twdEl = document.getElementById('total-twd');
  const dayExpEl = document.getElementById('day-expenses');

  const total = expenses.reduce((s,e) => s + e.amount, 0);
  totalEl.textContent = `${trip.currency} ${total.toLocaleString()}`;
  if (exchangeRate) twdEl.textContent = `≈ NT$ ${Math.round(total * exchangeRate).toLocaleString()}`;

  // By day
  const byDay = trip.days.map((d,i) => {
    const s = expenses.filter(e => e.dayIdx === i).reduce((a,e) => a+e.amount, 0);
    return { label: d.label, date: d.date, sum: s };
  });
  dayExpEl.innerHTML = byDay.map(d => `
    <div class="day-expense-chip">
      <div class="dec-day">${d.label} ${d.date}</div>
      <div class="dec-amt">${d.sum.toLocaleString()}</div>
    </div>
  `).join('');

  if (!expenses.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">💳</div><div class="empty-text">還沒有支出記錄</div></div>`;
    return;
  }
  list.innerHTML = [...expenses].reverse().map((e, ri) => {
    const i = expenses.length - 1 - ri;
    const day = trip.days[e.dayIdx];
    return `<div class="expense-item">
      <div class="expense-icon">${e.cat}</div>
      <div class="expense-info">
        <div class="expense-name">${e.name}</div>
        <div class="expense-day-tag">${day ? day.label + ' · ' + day.date : ''}</div>
      </div>
      <div class="expense-amount">${e.amount.toLocaleString()}</div>
      <button class="expense-del" onclick="deleteExpense(${i})">✕</button>
    </div>`;
  }).join('');
}

function addExpense() {
  const name = document.getElementById('exp-name').value.trim();
  const amount = parseFloat(document.getElementById('exp-amount').value);
  if (!name) { alert('請輸入項目名稱'); return; }
  if (!amount || amount <= 0) { alert('請輸入正確金額'); return; }
  expenses.push({
    dayIdx: currentDay,
    name,
    amount,
    cat: document.getElementById('exp-cat').value
  });
  document.getElementById('exp-name').value = '';
  document.getElementById('exp-amount').value = '';
  renderExpenses();
}

function deleteExpense(i) {
  expenses.splice(i, 1);
  renderExpenses();
}

function renderMapSpots() {
  const spots = planItems.filter(p => p.cat !== '🚌 交通' && p.cat !== '🏨 住宿');
  const wrap = document.getElementById('map-spots');
  const mapEl = document.getElementById('map-placeholder');

  if (!spots.length) {
    wrap.innerHTML = `<div class="empty"><div class="empty-icon">📍</div><div class="empty-text">新增景點後會顯示在這裡</div></div>`;
    return;
  }

  wrap.innerHTML = spots.map((s, i) => {
    const day = trip.days[s.dayIdx];
    const query = encodeURIComponent(`${trip.dest} ${s.name}`);
    const gmapsUrl = `https://www.google.com/maps/search/?api=1&query=${query}`;
    return `<div class="map-spot-item">
      <div class="spot-pin">📍</div>
      <div class="spot-info">
        <div class="spot-name">${s.name}</div>
        <div class="spot-day">${day ? day.label + ' · ' + s.time : ''} · ${s.cat}</div>
      </div>
      <button class="spot-map-btn" onclick="openMap('${query}', '${gmapsUrl}')">地圖</button>
    </div>`;
  }).join('');
}

function openMap(query, url) {
  const mapContainer = document.getElementById('map-container');
  const embedUrl = `https://maps.google.com/maps?q=${query}&output=embed`;
  mapContainer.innerHTML = `<iframe src="${embedUrl}" allowfullscreen loading="lazy"></iframe>`;
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
}

function resetTrip() {
  if (!confirm('重新設定會清除所有資料，確定嗎？')) return;
  planItems = []; expenses = []; currentDay = 0; exchangeRate = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
}

// Set today as default start date
const today = new Date().toISOString().split('T')[0];
document.getElementById('start-date').value = today;
const next7 = new Date(); next7.setDate(next7.getDate()+6);
document.getElementById('end-date').value = next7.toISOString().split('T')[0];

// Register Service Worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
