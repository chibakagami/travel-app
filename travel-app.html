<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>旅行計畫</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="旅行計畫">
<meta name="theme-color" content="#C8703A">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Playfair+Display:wght@600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--sand:#F5ECD7;--warm:#E8D5B0;--terracotta:#C8703A;--terra-dark:#9E4E22;--deep:#2C2416;--mid:#6B5744;--light:#FAF6EE;--red:#C0392B;--blue:#1a6b8a;--shadow:0 4px 20px rgba(44,36,22,0.12);--radius:16px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--light);color:var(--deep);min-height:100vh;max-width:480px;margin:0 auto;}
#setup-screen{min-height:100vh;background:linear-gradient(160deg,#2C2416 0%,#6B3A1F 50%,#C8703A 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;position:relative;overflow:hidden;}
#setup-screen::before{content:'';position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,0.04);top:-80px;right:-80px;}
#setup-screen::after{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,0.04);bottom:40px;left:-60px;}
.setup-title{font-family:'Playfair Display',serif;color:var(--sand);font-size:36px;text-align:center;margin-bottom:8px;position:relative;z-index:1;}
.setup-sub{color:rgba(245,236,215,0.6);font-size:14px;text-align:center;margin-bottom:40px;position:relative;z-index:1;}
.setup-card{background:rgba(255,255,255,0.1);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.15);border-radius:24px;padding:28px 24px;width:100%;position:relative;z-index:1;}
.field-group{margin-bottom:20px;}
.field-label{color:rgba(245,236,215,0.8);font-size:12px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;display:block;}
.field-input{width:100%;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:12px;color:var(--sand);font-family:'Noto Sans TC',sans-serif;font-size:15px;padding:12px 16px;outline:none;}
.field-input::placeholder{color:rgba(245,236,215,0.35);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
select.field-input option{background:#3a2a1a;color:#f5ecd7;}
.btn-start{width:100%;background:var(--terracotta);color:white;border:none;border-radius:14px;padding:16px;font-family:'Noto Sans TC',sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;}
#app{display:none;flex-direction:column;min-height:100vh;}
.app-header{background:var(--deep);padding:16px 20px 12px;position:sticky;top:0;z-index:100;}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;}
.trip-name{font-family:'Playfair Display',serif;font-size:22px;color:var(--sand);}
.trip-dates{font-size:12px;color:rgba(245,236,215,0.55);margin-top:2px;}
.header-reset{background:rgba(255,255,255,0.08);border:none;border-radius:8px;color:rgba(245,236,215,0.6);font-size:12px;padding:6px 10px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.tab-bar{background:var(--deep);display:flex;border-top:1px solid rgba(255,255,255,0.08);padding:0 4px 4px;position:sticky;bottom:0;z-index:100;order:10;}
.tab-btn{flex:1;background:none;border:none;color:rgba(245,236,215,0.4);font-family:'Noto Sans TC',sans-serif;font-size:11px;padding:10px 4px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;}
.tab-btn.active{color:var(--terracotta);}
.tab-icon{font-size:20px;line-height:1;}
.tab-content{display:none;flex:1;padding:16px;}
.tab-content.active{display:block;}
.day-tabs-wrap{overflow-x:auto;margin:0 -16px;padding:0 16px;scrollbar-width:none;margin-bottom:16px;}
.day-tabs-wrap::-webkit-scrollbar{display:none;}
.day-tabs{display:flex;gap:8px;white-space:nowrap;padding-bottom:4px;}
.day-tab{background:white;border:2px solid var(--warm);border-radius:10px;color:var(--mid);font-family:'Noto Sans TC',sans-serif;font-size:13px;padding:7px 14px;cursor:pointer;flex-shrink:0;}
.day-tab.active{background:var(--terracotta);border-color:var(--terracotta);color:white;font-weight:600;}

/* BOARDING PASS */
.boarding-pass{position:relative;margin-bottom:16px;filter:drop-shadow(0 6px 18px rgba(26,90,120,0.3));}
.bp-main{background:linear-gradient(135deg,#0f4c75 0%,#1b6ca8 45%,#2196c4 100%);border-radius:16px 16px 0 0;padding:18px 20px 16px;color:white;}
.bp-top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.bp-airline{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:0.15em;opacity:0.7;text-transform:uppercase;}
.bp-flight-num{font-family:'Share Tech Mono',monospace;font-size:12px;background:rgba(255,255,255,0.15);padding:3px 10px;border-radius:6px;}
.bp-del{background:rgba(255,255,255,0.12);border:none;border-radius:8px;color:rgba(255,255,255,0.7);font-size:13px;padding:4px 8px;cursor:pointer;}
.bp-route{display:flex;align-items:center;gap:6px;margin-bottom:14px;}
.bp-airport{text-align:center;min-width:56px;}
.bp-iata{font-family:'Share Tech Mono',monospace;font-size:30px;font-weight:700;line-height:1;}
.bp-city{font-size:10px;opacity:0.6;margin-top:3px;}
.bp-mid{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bp-arrow-line{display:flex;align-items:center;width:100%;gap:3px;}
.bp-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.4);flex-shrink:0;}
.bp-dashes{flex:1;border-top:2px dashed rgba(255,255,255,0.3);}
.bp-dur-text{font-family:'Share Tech Mono',monospace;font-size:10px;opacity:0.6;}
.bp-times-row{display:flex;justify-content:space-between;}
.bp-time-blk{text-align:center;}
.bp-time-big{font-family:'Share Tech Mono',monospace;font-size:22px;font-weight:700;}
.bp-time-lbl{font-size:9px;opacity:0.55;letter-spacing:0.08em;text-transform:uppercase;margin-top:2px;}
.bp-tear{height:20px;background:linear-gradient(135deg,#1565a0,#1a7bbf);display:flex;align-items:center;position:relative;}
.bp-tear::before{content:'';position:absolute;left:-10px;width:20px;height:20px;border-radius:50%;background:var(--light);z-index:2;}
.bp-tear::after{content:'';position:absolute;right:-10px;width:20px;height:20px;border-radius:50%;background:var(--light);z-index:2;}
.bp-tear-line{flex:1;margin:0 8px;border-top:2px dashed rgba(255,255,255,0.25);}
.bp-tear-txt{position:absolute;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;font-size:8px;color:rgba(255,255,255,0.35);letter-spacing:0.15em;white-space:nowrap;}
.bp-stub{background:linear-gradient(135deg,#1a7bbf,#2196c4);border-radius:0 0 16px 16px;padding:12px 20px 14px;color:white;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.bp-stub-f{text-align:center;}
.bp-stub-lbl{font-size:8px;opacity:0.5;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px;}
.bp-stub-v{font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700;}
.bp-barcode{display:flex;gap:1.5px;align-items:flex-end;height:26px;}
.bp-barcode span{display:inline-block;background:rgba(255,255,255,0.65);border-radius:1px;}
.bp-note-strip{background:linear-gradient(135deg,#1a7bbf,#2196c4);border-radius:0 0 16px 16px;padding:6px 20px 12px;color:rgba(255,255,255,0.65);font-size:11px;margin-top:-4px;}
.btn-add-flight{width:100%;background:rgba(26,107,138,0.08);border:2px dashed rgba(26,107,138,0.25);border-radius:12px;color:var(--blue);font-family:'Noto Sans TC',sans-serif;font-size:14px;padding:12px;cursor:pointer;margin-bottom:16px;}
.flight-form{background:white;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:16px;display:none;}
.flight-form.open{display:block;}

/* TIMELINE */
.plan-timeline{display:flex;flex-direction:column;margin-bottom:16px;}
.plan-item{background:white;border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);display:flex;gap:12px;align-items:flex-start;}
.plan-time-col{min-width:48px;display:flex;flex-direction:column;align-items:center;}
.plan-time{font-size:13px;font-weight:700;color:var(--terracotta);}
.plan-end-time{font-size:11px;color:var(--mid);opacity:0.65;margin-top:2px;}
.plan-body{flex:1;min-width:0;}
.plan-name{font-size:15px;font-weight:600;color:var(--deep);margin-bottom:4px;}
.plan-note-txt{font-size:12px;color:var(--mid);line-height:1.4;margin-bottom:4px;}
.plan-tags{display:flex;flex-wrap:wrap;gap:6px;}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;}
.tag-cat{background:var(--warm);color:var(--mid);}
.tag-stay{background:rgba(200,112,58,0.1);color:var(--terracotta);}
.plan-del{background:none;border:none;color:#ddd;font-size:18px;cursor:pointer;padding:2px 4px;line-height:1;}
.plan-del:active{color:var(--red);}

/* TRANSPORT CONNECTOR */
.tc-wrap{display:flex;align-items:stretch;}
.tc-spine{width:48px;display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
.tc-vline{width:2px;background:var(--warm);flex:1;min-height:10px;}
.tc-circle{width:10px;height:10px;border-radius:50%;background:white;border:2px solid var(--warm);flex-shrink:0;}
.tc-card{flex:1;margin:4px 0;background:white;border-radius:12px;border:1.5px solid var(--warm);box-shadow:0 2px 8px rgba(44,36,22,0.06);overflow:hidden;}
.tc-summary{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;}
.tc-icon-big{font-size:20px;}
.tc-info{flex:1;}
.tc-mode-label{font-size:13px;font-weight:600;color:var(--deep);}
.tc-dur-label{font-size:11px;color:var(--mid);margin-top:1px;}
.tc-chevron{font-size:11px;color:var(--mid);transition:transform 0.2s;display:inline-block;}
.tc-chevron.open{transform:rotate(180deg);}
.tc-panel{display:none;padding:12px 14px 14px;border-top:1px solid var(--warm);}
.tc-panel.open{display:block;}
.tc-panel-title{font-size:11px;font-weight:600;color:var(--mid);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px;}
.tc-mode-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.tc-mode-btn{background:var(--light);border:1.5px solid var(--warm);border-radius:10px;padding:8px 4px;text-align:center;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.tc-mode-btn .tm-icon{font-size:20px;display:block;margin-bottom:3px;}
.tc-mode-btn .tm-label{font-size:10px;color:var(--mid);}
.tc-mode-btn.sel{background:var(--terracotta);border-color:var(--terracotta);}
.tc-mode-btn.sel .tm-label{color:white;}
.tc-dur-row{display:flex;gap:8px;align-items:center;}
.tc-dur-field{flex:1;border:1.5px solid var(--warm);border-radius:10px;padding:9px 12px;font-size:14px;font-family:'Noto Sans TC',sans-serif;outline:none;color:var(--deep);}
.tc-dur-field:focus{border-color:var(--terracotta);}
.tc-done-btn{background:var(--terracotta);color:white;border:none;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif;white-space:nowrap;}

/* FORMS */
.add-card{background:white;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:16px;}
.add-card h3{font-size:14px;font-weight:600;color:var(--mid);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.06em;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.form-input{width:100%;border:1.5px solid var(--warm);border-radius:10px;padding:10px 12px;font-family:'Noto Sans TC',sans-serif;font-size:14px;color:var(--deep);outline:none;background:var(--light);}
.form-input:focus{border-color:var(--terracotta);}
.btn-add{width:100%;background:var(--terracotta);color:white;border:none;border-radius:10px;padding:12px;font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}

/* EXPENSE */
.expense-summary{background:var(--deep);border-radius:var(--radius);padding:20px;margin-bottom:16px;color:var(--sand);}
.expense-total-label{font-size:12px;opacity:0.6;margin-bottom:4px;}
.expense-total-amount{font-family:'Playfair Display',serif;font-size:32px;}
.expense-twd{font-size:13px;opacity:0.55;margin-top:4px;}
.expense-rate{font-size:11px;opacity:0.4;margin-top:2px;}
.expense-by-day{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-top:14px;}
.expense-by-day::-webkit-scrollbar{display:none;}
.day-expense-chip{background:rgba(255,255,255,0.1);border-radius:10px;padding:8px 12px;min-width:72px;flex-shrink:0;text-align:center;}
.dec-day{font-size:11px;opacity:0.55;margin-bottom:2px;}
.dec-amt{font-size:13px;font-weight:600;}
.expense-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.expense-item{background:white;border-radius:12px;padding:12px 14px;box-shadow:0 2px 8px rgba(44,36,22,0.07);display:flex;align-items:center;gap:12px;}
.expense-icon{width:36px;height:36px;border-radius:10px;background:var(--warm);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.expense-info{flex:1;}
.expense-name{font-size:14px;font-weight:600;}
.expense-day-tag{font-size:11px;color:var(--mid);}
.expense-amount{font-size:15px;font-weight:700;color:var(--terracotta);}
.expense-del{background:none;border:none;color:#ddd;font-size:16px;cursor:pointer;}

/* MAP */
#map-container{border-radius:var(--radius);overflow:hidden;height:280px;margin-bottom:16px;box-shadow:var(--shadow);background:var(--warm);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--mid);position:relative;}
#map-container iframe{width:100%;height:100%;border:none;position:absolute;top:0;left:0;}
.map-spots{display:flex;flex-direction:column;gap:8px;}
.map-spot-item{background:white;border-radius:12px;padding:12px 14px;box-shadow:0 2px 8px rgba(44,36,22,0.07);display:flex;align-items:center;gap:12px;}
.spot-pin{width:32px;height:32px;border-radius:50%;background:var(--terracotta);color:white;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.spot-info{flex:1;}
.spot-name{font-size:14px;font-weight:600;}
.spot-day{font-size:12px;color:var(--mid);}
.spot-map-btn{font-size:12px;color:var(--terracotta);background:rgba(200,112,58,0.1);border:none;border-radius:8px;padding:5px 10px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.empty{text-align:center;padding:40px 20px;color:var(--mid);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-text{font-size:14px;opacity:0.7;}
</style>
</head>
<body>

<div id="setup-screen">
  <div class="setup-title">✈ 旅行計畫</div>
  <div class="setup-sub">規劃你的完美旅程</div>
  <div class="setup-card">
    <div class="field-group"><label class="field-label">目的地</label><input class="field-input" id="dest-input" placeholder="例：東京、首爾、曼谷"/></div>
    <div class="field-row">
      <div class="field-group"><label class="field-label">出發日期</label><input class="field-input" type="date" id="start-date"/></div>
      <div class="field-group"><label class="field-label">回程日期</label><input class="field-input" type="date" id="end-date"/></div>
    </div>
    <div class="field-group"><label class="field-label">當地貨幣</label>
      <select class="field-input" id="currency-select">
        <option value="JPY">JPY 日幣</option><option value="KRW">KRW 韓元</option><option value="THB">THB 泰銖</option>
        <option value="USD">USD 美金</option><option value="EUR">EUR 歐元</option><option value="HKD">HKD 港幣</option>
        <option value="SGD">SGD 新幣</option><option value="VND">VND 越南盾</option><option value="MYR">MYR 馬幣</option>
      </select>
    </div>
    <button class="btn-start" onclick="startTrip()">開始規劃 →</button>
  </div>
</div>

<div id="app">
  <div class="app-header">
    <div class="header-top">
      <div><div class="trip-name" id="header-dest"></div><div class="trip-dates" id="header-dates"></div></div>
      <button class="header-reset" onclick="resetTrip()">重新設定</button>
    </div>
  </div>

  <div class="tab-content active" id="tab-plan">
    <div class="day-tabs-wrap"><div class="day-tabs" id="day-tabs"></div></div>
    <div id="flight-cards"></div>
    <button class="btn-add-flight" onclick="toggleFlightForm()">✈ 新增航班資訊</button>
    <div class="flight-form" id="flight-form">
      <h3 style="font-size:14px;font-weight:600;color:var(--mid);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.06em">航班資訊</h3>
      <div class="form-row"><input class="form-input" id="fl-dep" placeholder="出發機場 (TPE)"><input class="form-input" id="fl-arr" placeholder="抵達機場 (NRT)"></div>
      <div class="form-row"><input class="form-input" id="fl-airline" placeholder="航空公司 (長榮)"><input class="form-input" id="fl-num" placeholder="航班號 (BR198)"></div>
      <div class="form-row"><input class="form-input" type="time" id="fl-dep-time" value="10:00"><input class="form-input" type="time" id="fl-arr-time" value="14:00"></div>
      <input class="form-input" id="fl-note" placeholder="備註（可選）" style="margin-bottom:10px;width:100%">
      <button class="btn-add" onclick="addFlight()">＋ 加入航班</button>
    </div>
    <div class="plan-timeline" id="plan-timeline"></div>
    <div class="add-card">
      <h3>新增行程</h3>
      <input class="form-input" id="plan-name" placeholder="景點 / 活動名稱" style="margin-bottom:10px;width:100%">
      <div class="form-row">
        <input class="form-input" type="time" id="plan-time" value="09:00">
        <select class="form-input" id="plan-cat">
          <option value="🏛 景點">🏛 景點</option><option value="🍜 餐廳">🍜 餐廳</option>
          <option value="🛍 購物">🛍 購物</option><option value="🏨 住宿">🏨 住宿</option>
          <option value="✈ 機場">✈ 機場</option><option value="☕ 咖啡">☕ 咖啡</option>
          <option value="🎭 體驗">🎭 體驗</option>
        </select>
      </div>
      <div class="form-row">
        <select class="form-input" id="plan-stay">
          <option value="0">不設定停留</option><option value="30">停留 30 分鐘</option>
          <option value="60" selected>停留 1 小時</option><option value="90">停留 1.5 小時</option>
          <option value="120">停留 2 小時</option><option value="180">停留 3 小時</option>
          <option value="240">停留 4 小時</option><option value="360">停留 6 小時</option>
        </select>
        <input class="form-input" id="plan-note" placeholder="備註（可選）">
      </div>
      <button class="btn-add" onclick="addPlanItem()" style="margin-top:4px">＋ 加入行程</button>
    </div>
  </div>

  <div class="tab-content" id="tab-expense">
    <div class="expense-summary">
      <div class="expense-total-label">總花費</div>
      <div class="expense-total-amount" id="total-amount">0</div>
      <div class="expense-twd" id="total-twd">≈ NT$ 0</div>
      <div class="expense-rate" id="rate-display">匯率載入中...</div>
      <div class="expense-by-day" id="day-expenses"></div>
    </div>
    <div class="add-card">
      <h3>新增支出</h3>
      <input class="form-input" id="exp-name" placeholder="項目名稱" style="margin-bottom:10px;width:100%">
      <div class="form-row">
        <input class="form-input" type="number" id="exp-amount" placeholder="金額">
        <select class="form-input" id="exp-cat">
          <option value="🍜">🍜 餐飲</option><option value="🚌">🚌 交通</option>
          <option value="🏛">🏛 門票</option><option value="🛍">🛍 購物</option>
          <option value="🏨">🏨 住宿</option><option value="💊">💊 其他</option>
        </select>
      </div>
      <button class="btn-add" onclick="addExpense()">＋ 加入支出</button>
    </div>
    <div class="expense-list" id="expense-list"></div>
  </div>

  <div class="tab-content" id="tab-map">
    <div id="map-container"><div style="text-align:center"><div style="font-size:40px;margin-bottom:8px">🗺</div><div style="font-size:14px">點擊景點可開啟地圖</div></div></div>
    <div class="map-spots" id="map-spots"></div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('plan',this)"><span class="tab-icon">📅</span>行程</button>
    <button class="tab-btn" onclick="switchTab('expense',this)"><span class="tab-icon">💰</span>記帳</button>
    <button class="tab-btn" onclick="switchTab('map',this)"><span class="tab-icon">🗺</span>地圖</button>
  </div>
</div>

<script>
var trip={dest:'',startDate:'',endDate:'',currency:'JPY',days:[]};
var planItems=[],transports=[],flights=[],expenses=[];
var currentDay=0,exchangeRate=null,openTcId=null,_id=1;
function uid(){return _id++;}
var MODES=[
  {key:'walk',icon:'🚶',label:'步行'},{key:'metro',icon:'🚇',label:'地鐵'},
  {key:'bus',icon:'🚌',label:'公車'},{key:'taxi',icon:'🚕',label:'計程車'},
  {key:'car',icon:'🚗',label:'自駕'},{key:'bike',icon:'🚲',label:'腳踏車'},
  {key:'train',icon:'🚆',label:'火車'},{key:'ship',icon:'⛴',label:'渡輪'}
];
function t2m(t){var p=t.split(':');return+p[0]*60+ +p[1];}
function m2t(m){m=((m%1440)+1440)%1440;return(''+Math.floor(m/60)).padStart(2,'0')+':'+(''+m%60).padStart(2,'0');}
function stayTxt(m){if(!m)return'';if(m<60)return m+'分';if(m%60===0)return m/60+'小時';return Math.floor(m/60)+'h'+m%60+'m';}
function parseDur(s){
  if(!s||!s.trim())return 0;
  var m=0,hm=s.match(/(\d+)\s*[hH小時]/),mm=s.match(/(\d+)\s*[mM分]/);
  if(hm)m+=+hm[1]*60;if(mm)m+=+mm[1];
  if(!hm&&!mm){var n=+s;if(!isNaN(n)&&n>0)m=n;}
  return m;
}
function startTrip(){
  var dest=document.getElementById('dest-input').value.trim();
  var s=document.getElementById('start-date').value,e=document.getElementById('end-date').value;
  var c=document.getElementById('currency-select').value;
  if(!dest){alert('請輸入目的地');return;}if(!s||!e){alert('請選擇日期');return;}if(s>e){alert('日期有誤');return;}
  trip={dest:dest,startDate:s,endDate:e,currency:c,days:genDays(s,e)};
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('app').style.flexDirection='column';
  document.getElementById('header-dest').textContent=dest;
  document.getElementById('header-dates').textContent=s.replace(/-/g,'/')+' → '+e.replace(/-/g,'/')+' ('+trip.days.length+'天)';
  renderAll();fetchRate(c);
}
function genDays(s,e){
  var days=[],d=new Date(s),en=new Date(e),i=1;
  while(d<=en){days.push({label:'D'+i,date:(''+( d.getMonth()+1)).padStart(2,'0')+'/'+(''+d.getDate()).padStart(2,'0')});d.setDate(d.getDate()+1);i++;}
  return days;
}
function renderAll(){renderDayTabs();renderFlightCards();renderTimeline();renderExpenses();renderMapSpots();}
function renderDayTabs(){
  document.getElementById('day-tabs').innerHTML=trip.days.map(function(d,i){
    return '<button class="day-tab'+(i===currentDay?' active':'')+'" onclick="selectDay('+i+')">'+d.label+'<br><span style="font-size:11px;opacity:0.7">'+d.date+'</span></button>';
  }).join('');
}
function selectDay(i){currentDay=i;openTcId=null;renderDayTabs();renderFlightCards();renderTimeline();}

// FLIGHT
function toggleFlightForm(){document.getElementById('flight-form').classList.toggle('open');}
function calcFlightDur(a,b){var d=(t2m(b)-t2m(a)+1440)%1440;return Math.floor(d/60)+'h'+(d%60?' '+d%60+'m':'');}
function genBarcode(){var s='';for(var i=0;i<20;i++){var w=Math.random()>.6?3:Math.random()>.4?2:1;var h=14+Math.random()*10;s+='<span style="width:'+w+'px;height:'+h+'px"></span>';}return s;}
function addFlight(){
  var dep=document.getElementById('fl-dep').value.trim().toUpperCase();
  var arr=document.getElementById('fl-arr').value.trim().toUpperCase();
  if(!dep||!arr){alert('請輸入機場代碼');return;}
  flights.push({id:uid(),dayIdx:currentDay,dep:dep,arr:arr,
    airline:document.getElementById('fl-airline').value.trim(),
    num:document.getElementById('fl-num').value.trim().toUpperCase(),
    depTime:document.getElementById('fl-dep-time').value,
    arrTime:document.getElementById('fl-arr-time').value,
    note:document.getElementById('fl-note').value.trim()});
  ['fl-dep','fl-arr','fl-airline','fl-num','fl-note'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('flight-form').classList.remove('open');
  renderFlightCards();
}
function renderFlightCards(){
  var wrap=document.getElementById('flight-cards');
  var df=flights.filter(function(f){return f.dayIdx===currentDay;});
  if(!df.length){wrap.innerHTML='';return;}
  wrap.innerHTML=df.map(function(f){
    var dur=calcFlightDur(f.depTime,f.arrTime);
    return '<div class="boarding-pass">'+
      '<div class="bp-main">'+
        '<div class="bp-top-row">'+
          '<span class="bp-airline">'+(f.airline||'BOARDING PASS')+'</span>'+
          '<span class="bp-flight-num">'+(f.num||'——')+'</span>'+
          '<button class="bp-del" onclick="delFlight('+f.id+')">✕</button>'+
        '</div>'+
        '<div class="bp-route">'+
          '<div class="bp-airport"><div class="bp-iata">'+f.dep+'</div><div class="bp-city">出發</div></div>'+
          '<div class="bp-mid">'+
            '<div class="bp-arrow-line"><div class="bp-dot"></div><div class="bp-dashes"></div><span>✈</span><div class="bp-dashes"></div><div class="bp-dot"></div></div>'+
            '<div class="bp-dur-text">'+dur+'</div>'+
          '</div>'+
          '<div class="bp-airport"><div class="bp-iata">'+f.arr+'</div><div class="bp-city">抵達</div></div>'+
        '</div>'+
        '<div class="bp-times-row">'+
          '<div class="bp-time-blk"><div class="bp-time-big">'+f.depTime+'</div><div class="bp-time-lbl">Departure</div></div>'+
          '<div class="bp-time-blk" style="text-align:right"><div class="bp-time-big">'+f.arrTime+'</div><div class="bp-time-lbl">Arrival</div></div>'+
        '</div>'+
      '</div>'+
      '<div class="bp-tear"><div class="bp-tear-line"></div><div class="bp-tear-txt">✂ TEAR HERE</div></div>'+
      '<div class="bp-stub">'+
        '<div class="bp-stub-f"><div class="bp-stub-lbl">From</div><div class="bp-stub-v">'+f.dep+'</div></div>'+
        '<div class="bp-stub-f"><div class="bp-stub-lbl">To</div><div class="bp-stub-v">'+f.arr+'</div></div>'+
        '<div class="bp-stub-f"><div class="bp-stub-lbl">Flight</div><div class="bp-stub-v">'+(f.num||'——')+'</div></div>'+
        '<div class="bp-barcode">'+genBarcode()+'</div>'+
      '</div>'+
      (f.note?'<div class="bp-note-strip">📝 '+f.note+'</div>':'')+
    '</div>';
  }).join('');
}
function delFlight(id){flights=flights.filter(function(f){return f.id!==id;});renderFlightCards();}

// TIMELINE
function computeTimes(){
  var items=planItems.filter(function(p){return p.dayIdx===currentDay;}).sort(function(a,b){return a.time.localeCompare(b.time);});
  var result=[];
  for(var i=0;i<items.length;i++){
    var item=items[i];
    var startMin;
    if(i===0){
      startMin=t2m(item.time);
    } else {
      var prev=result[i-1];
      var tc=null;
      for(var j=0;j<transports.length;j++){if(transports[j].dayIdx===currentDay&&transports[j].afterItemId===prev.id){tc=transports[j];break;}}
      startMin=(prev.endMin!=null?prev.endMin:prev.startMin)+(tc?tc.durMin:0);
    }
    result.push({id:item.id,name:item.name,cat:item.cat,note:item.note,stay:item.stay,startMin:startMin,endMin:item.stay?startMin+item.stay:null});
  }
  return result;
}
function getTc(itemId){
  for(var i=0;i<transports.length;i++){if(transports[i].dayIdx===currentDay&&transports[i].afterItemId===itemId)return transports[i];}
  return null;
}
function renderTimeline(){
  var items=computeTimes();
  var wrap=document.getElementById('plan-timeline');
  // update suggested next time
  if(items.length>0){
    var last=items[items.length-1];
    var ltc=getTc(last.id);
    document.getElementById('plan-time').value=m2t((last.endMin!=null?last.endMin:last.startMin)+(ltc?ltc.durMin:0));
  }
  if(!items.length){wrap.innerHTML='<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">還沒有行程，新增第一個吧！</div></div>';return;}
  var html='';
  for(var i=0;i<items.length;i++){
    var item=items[i];
    var startT=m2t(item.startMin);
    var endT=item.endMin!=null?m2t(item.endMin):null;
    // Plan card
    html+='<div class="plan-item">'+
      '<div class="plan-time-col"><div class="plan-time">'+startT+'</div>'+(endT?'<div class="plan-end-time">↓'+endT+'</div>':'')+
      '</div><div class="plan-body"><div class="plan-name">'+item.name+'</div>'+
      (item.note?'<div class="plan-note-txt">'+item.note+'</div>':'')+
      '<div class="plan-tags"><span class="tag tag-cat">'+item.cat+'</span>'+(item.stay?'<span class="tag tag-stay">⏱ '+stayTxt(item.stay)+'</span>':'')+
      '</div></div><button class="plan-del" onclick="delPlan('+item.id+')">✕</button></div>';
    // Transport connector — shown after EVERY item
    var tc=getTc(item.id);
    var tcMode=tc?tc.mode:'walk';
    var tcDur=tc?tc.dur:'';
    var mode=MODES[0];
    for(var k=0;k<MODES.length;k++){if(MODES[k].key===tcMode){mode=MODES[k];break;}}
    var tcKey='tc'+item.id;
    var isOpen=openTcId===tcKey;
    html+='<div class="tc-wrap">'+
      '<div class="tc-spine"><div class="tc-vline"></div><div class="tc-circle"></div><div class="tc-vline"></div></div>'+
      '<div class="tc-card">'+
        '<div class="tc-summary" onclick="toggleTc(\''+tcKey+'\')">'+
          '<span class="tc-icon-big">'+mode.icon+'</span>'+
          '<div class="tc-info"><div class="tc-mode-label">'+mode.label+'</div>'+
          '<div class="tc-dur-label">'+(tcDur?tcDur:'點此設定交通時間')+'</div></div>'+
          '<span class="tc-chevron'+(isOpen?' open':'')+'" id="chv'+tcKey+'">▼</span>'+
        '</div>'+
        '<div class="tc-panel'+(isOpen?' open':'')+'" id="pnl'+tcKey+'">'+
          '<div class="tc-panel-title">選擇交通方式</div>'+
          '<div class="tc-mode-grid">'+
            MODES.map(function(m){return '<div class="tc-mode-btn'+(tcMode===m.key?' sel':'')+'" onclick="setMode('+item.id+',\''+m.key+'\')"><span class="tm-icon">'+m.icon+'</span><span class="tm-label">'+m.label+'</span></div>';}).join('')+
          '</div>'+
          '<div class="tc-dur-row">'+
            '<input class="tc-dur-field" id="dur'+item.id+'" placeholder="時間（如 30分、1小時）" value="'+tcDur+'">'+
            '<button class="tc-done-btn" onclick="saveTc('+item.id+')">確定</button>'+
          '</div>'+
        '</div>'+
      '</div></div>';
  }
  wrap.innerHTML=html;
}
function toggleTc(key){openTcId=openTcId===key?null:key;renderTimeline();}
function setMode(itemId,modeKey){
  var tc=getTc(itemId);
  if(!tc){tc={id:uid(),dayIdx:currentDay,afterItemId:itemId,mode:modeKey,dur:'',durMin:0};transports.push(tc);}
  else tc.mode=modeKey;
  openTcId='tc'+itemId;
  renderTimeline();
}
function saveTc(itemId){
  var inp=document.getElementById('dur'+itemId);
  var dur=inp?inp.value.trim():'';
  var tc=getTc(itemId);
  if(!tc){tc={id:uid(),dayIdx:currentDay,afterItemId:itemId,mode:'walk',dur:dur,durMin:parseDur(dur)};transports.push(tc);}
  else{tc.dur=dur;tc.durMin=parseDur(dur);}
  openTcId=null;renderTimeline();
}
function addPlanItem(){
  var name=document.getElementById('plan-name').value.trim();
  if(!name){alert('請輸入景點名稱');return;}
  var stay=+document.getElementById('plan-stay').value||0;
  var items=computeTimes();
  var startTime=document.getElementById('plan-time').value;
  if(items.length>0){
    var last=items[items.length-1];
    var tc=getTc(last.id);
    startTime=m2t((last.endMin!=null?last.endMin:last.startMin)+(tc?tc.durMin:0));
  }
  planItems.push({id:uid(),dayIdx:currentDay,time:startTime,name:name,cat:document.getElementById('plan-cat').value,note:document.getElementById('plan-note').value.trim(),stay:stay});
  document.getElementById('plan-name').value='';document.getElementById('plan-note').value='';
  renderTimeline();renderMapSpots();
}
function delPlan(id){
  planItems=planItems.filter(function(p){return p.id!==id;});
  transports=transports.filter(function(t){return t.afterItemId!==id;});
  renderTimeline();renderMapSpots();
}

// EXPENSE
function fetchRate(c){
  fetch('https://open.er-api.com/v6/latest/TWD').then(function(r){return r.json();}).then(function(d){
    if(d.rates&&d.rates[c]){exchangeRate=1/d.rates[c];document.getElementById('rate-display').textContent='1 '+c+' ≈ NT$ '+exchangeRate.toFixed(2);}
    else setFR(c);renderExpenses();
  }).catch(function(){setFR(c);renderExpenses();});
}
function setFR(c){var fb={JPY:0.22,KRW:0.024,THB:0.9,USD:32,EUR:34,HKD:4.1,SGD:24,VND:0.0013,MYR:7};exchangeRate=fb[c]||1;document.getElementById('rate-display').textContent='1 '+trip.currency+' ≈ NT$ '+exchangeRate.toFixed(2)+'（估算）';}
function renderExpenses(){
  var total=expenses.reduce(function(s,e){return s+e.amount;},0);
  document.getElementById('total-amount').textContent=trip.currency+' '+total.toLocaleString();
  if(exchangeRate)document.getElementById('total-twd').textContent='≈ NT$ '+Math.round(total*exchangeRate).toLocaleString();
  document.getElementById('day-expenses').innerHTML=trip.days.map(function(d,i){var s=expenses.filter(function(e){return e.dayIdx===i;}).reduce(function(a,e){return a+e.amount;},0);return'<div class="day-expense-chip"><div class="dec-day">'+d.label+' '+d.date+'</div><div class="dec-amt">'+s.toLocaleString()+'</div></div>';}).join('');
  var list=document.getElementById('expense-list');
  if(!expenses.length){list.innerHTML='<div class="empty"><div class="empty-icon">💳</div><div class="empty-text">還沒有支出記錄</div></div>';return;}
  list.innerHTML=expenses.slice().reverse().map(function(e,ri){var i=expenses.length-1-ri;var day=trip.days[e.dayIdx];return'<div class="expense-item"><div class="expense-icon">'+e.cat+'</div><div class="expense-info"><div class="expense-name">'+e.name+'</div><div class="expense-day-tag">'+(day?day.label+' · '+day.date:'')+'</div></div><div class="expense-amount">'+e.amount.toLocaleString()+'</div><button class="expense-del" onclick="delExp('+i+')">✕</button></div>';}).join('');
}
function addExpense(){
  var name=document.getElementById('exp-name').value.trim();var amount=+document.getElementById('exp-amount').value;
  if(!name){alert('請輸入名稱');return;}if(!amount||amount<=0){alert('請輸入金額');return;}
  expenses.push({dayIdx:currentDay,name:name,amount:amount,cat:document.getElementById('exp-cat').value});
  document.getElementById('exp-name').value='';document.getElementById('exp-amount').value='';renderExpenses();
}
function delExp(i){expenses.splice(i,1);renderExpenses();}

// MAP
function renderMapSpots(){
  var spots=planItems.filter(function(p){return p.cat!=='✈ 機場'&&p.cat!=='🏨 住宿';});
  var wrap=document.getElementById('map-spots');
  if(!spots.length){wrap.innerHTML='<div class="empty"><div class="empty-icon">📍</div><div class="empty-text">新增景點後會顯示在這裡</div></div>';return;}
  wrap.innerHTML=spots.map(function(s){var day=trip.days[s.dayIdx];var q=encodeURIComponent(trip.dest+' '+s.name);return'<div class="map-spot-item"><div class="spot-pin">📍</div><div class="spot-info"><div class="spot-name">'+s.name+'</div><div class="spot-day">'+(day?day.label+' · '+s.time:'')+' · '+s.cat+'</div></div><button class="spot-map-btn" onclick="openMap(\''+q+'\')">地圖</button></div>';}).join('');
}
function openMap(q){document.getElementById('map-container').innerHTML='<iframe src="https://maps.google.com/maps?q='+q+'&output=embed" allowfullscreen loading="lazy"></iframe>';}

function switchTab(tab,btn){
  document.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('tab-'+tab).classList.add('active');btn.classList.add('active');
}
function resetTrip(){
  if(!confirm('確定清除所有資料？'))return;
  planItems=[];transports=[];flights=[];expenses=[];currentDay=0;exchangeRate=null;_id=1;
  document.getElementById('app').style.display='none';document.getElementById('setup-screen').style.display='flex';
}
var today=new Date().toISOString().split('T')[0];
document.getElementById('start-date').value=today;
var nx=new Date();nx.setDate(nx.getDate()+6);
document.getElementById('end-date').value=nx.toISOString().split('T')[0];
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(function(){});
</script>
</body>
</html>
